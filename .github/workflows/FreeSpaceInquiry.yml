name: Check Free Disk Space

on:
  workflow_dispatch:    # manual trigger only

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Show available disk space
        run: |
          echo "=== Free disk space on runner ==="
          df -h /
          echo ""
          echo "=== Summary ==="
          df -h / | awk 'NR==2 {print "Free: " $4 " / " $2 " total (" $5 " used)"}'
