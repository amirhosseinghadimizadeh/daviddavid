name: SkyBlock Player Lookup

on:
  workflow_dispatch:
    inputs:
      player_input:
        description: 'Minecraft username OR UUID (32 chars, no dashes)'
        required: true
        type: string

jobs:
  lookup-player:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse input (username or UUID)
        id: parse
        run: |
          INPUT="${{ github.event.inputs.player_input }}"
          # Check if input is a 32-character hex string (UUID without dashes)
          if [[ "$INPUT" =~ ^[a-f0-9]{32}$ ]]; then
            echo "Input is a valid UUID"
            echo "uuid=$INPUT" >> $GITHUB_OUTPUT
            echo "username=unknown" >> $GITHUB_OUTPUT
          else
            # Assume it's a username, convert via Mojang API
            echo "Input is a username, converting to UUID..."
            RESPONSE=$(curl --max-time 10 -s "https://api.mojang.com/users/profiles/minecraft/$INPUT")
            UUID=$(echo "$RESPONSE" | jq -r '.id')
            if [ "$UUID" = "null" ] || [ -z "$UUID" ]; then
              echo "Invalid username: $INPUT"
              exit 1
            fi
            echo "uuid=$UUID" >> $GITHUB_OUTPUT
            echo "username=$INPUT" >> $GITHUB_OUTPUT
          fi

      - name: Fetch Hypixel player data
        id: hypixel
        env:
          HYPIXEL_API_KEY: ${{ secrets.HYPIXEL_API_KEY }}
        run: |
          UUID="${{ steps.parse.outputs.uuid }}"
          echo "Fetching data for UUID: $UUID"
          HTTP_CODE=$(curl -s -o player.json -w "%{http_code}" -H "API-Key: $HYPIXEL_API_KEY" "https://api.hypixel.net/player?uuid=$UUID")
          echo "HTTP response code: $HTTP_CODE"
          if [ "$HTTP_CODE" = "404" ]; then
            echo "player_exists=false" >> $GITHUB_OUTPUT
            echo "reason=Player never logged into Hypixel (HTTP 404)" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "$HTTP_CODE" != "200" ]; then
            echo "HTTP error $HTTP_CODE"
            cat player.json 2>/dev/null || echo "No body"
            exit 1
          fi
          SUCCESS=$(jq -r '.success' player.json)
          if [ "$SUCCESS" != "true" ]; then
            echo "API returned success=false"
            exit 1
          fi
          PLAYER_EXISTS=$(jq -r '.player != null' player.json)
          if [ "$PLAYER_EXISTS" != "true" ]; then
            echo "player_exists=false" >> $GITHUB_OUTPUT
            echo "reason=Player has no Hypixel data (null player field)" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "player_exists=true" >> $GITHUB_OUTPUT
          echo "✅ Player found"

      - name: Fetch SkyBlock profiles (if player exists)
        id: skyblock
        if: steps.hypixel.outputs.player_exists == 'true'
        env:
          HYPIXEL_API_KEY: ${{ secrets.HYPIXEL_API_KEY }}
        run: |
          UUID="${{ steps.parse.outputs.uuid }}"
          HTTP_CODE=$(curl -s -o profiles.json -w "%{http_code}" -H "API-Key: $HYPIXEL_API_KEY" "https://api.hypixel.net/skyblock/profiles?uuid=$UUID")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "has_profiles=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          SUCCESS=$(jq -r '.success' profiles.json)
          if [ "$SUCCESS" != "true" ]; then
            echo "has_profiles=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          COUNT=$(jq '.profiles | length' profiles.json)
          if [ "$COUNT" -gt 0 ]; then
            echo "has_profiles=true" >> $GITHUB_OUTPUT
          else
            echo "has_profiles=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate summary
        run: |
          UUID="${{ steps.parse.outputs.uuid }}"
          PLAYER_NAME="${{ steps.parse.outputs.username }}"
          if [ -z "$PLAYER_NAME" ] || [ "$PLAYER_NAME" = "unknown" ]; then
            DISPLAY_NAME="UUID: $UUID"
          else
            DISPLAY_NAME="$PLAYER_NAME (UUID: $UUID)"
          fi
          PLAYER_EXISTS="${{ steps.hypixel.outputs.player_exists }}"
          SUMMARY="summary.md"
          
          if [ "$PLAYER_EXISTS" != "true" ]; then
            REASON="${{ steps.hypixel.outputs.reason }}"
            {
              echo "## SkyBlock Player Lookup Results"
              echo ""
              echo "**Input:** ${{ github.event.inputs.player_input }}"
              echo "**Resolved UUID:** \`$UUID\`"
              echo ""
              echo "❌ **$REASON**"
              echo ""
              echo "Possible reasons:"
              echo "- The player has never joined Hypixel"
              echo "- The UUID is incorrect"
              echo "- The Hypixel API key is invalid or expired"
            } > $SUMMARY
          else
            # General data
            FIRST_MS=$(jq -r '.player.firstLogin // 0' player.json)
            LAST_MS=$(jq -r '.player.lastLogin // 0' player.json)
            if [ "$FIRST_MS" != "0" ] && [ "$FIRST_MS" != "null" ]; then
              FIRST_ONLINE=$(date -d "@$((FIRST_MS / 1000))" +"%Y-%m-%d %H:%M:%S UTC")
            else
              FIRST_ONLINE="Unknown"
            fi
            if [ "$LAST_MS" != "0" ] && [ "$LAST_MS" != "null" ]; then
              LAST_ONLINE=$(date -d "@$((LAST_MS / 1000))" +"%Y-%m-%d %H:%M:%S UTC")
            else
              LAST_ONLINE="Unknown"
            fi
            
            HAS_PROFILES="${{ steps.skyblock.outputs.has_profiles }}"
            if [ "$HAS_PROFILES" = "true" ]; then
              LATEST_PROFILE=$(jq --arg UUID "$UUID" '.profiles | map(select(.members[$UUID] != null)) | sort_by(.members[$UUID].last_save // 0 | tonumber) | reverse | .[0]' profiles.json)
              PROFILE_NAME=$(echo "$LATEST_PROFILE" | jq -r '.cute_name // "Unknown"')
              MEMBER=$(echo "$LATEST_PROFILE" | jq --arg UUID "$UUID" -r '.members[$UUID] // empty')
              LEVEL=$(echo "$MEMBER" | jq -r '.leveling.level // 0')
              RAW_LOC=$(echo "$MEMBER" | jq -r '.location // "Unknown"')
              case "$RAW_LOC" in
                "hub") LAST_LOC="Hub (SkyBlock Hub)" ;;
                "dynamic") LAST_LOC="Private Island / Garden" ;;
                "combat_1") LAST_LOC="Dungeon Hub" ;;
                "combat_2") LAST_LOC="The Catacombs" ;;
                "combat_3") LAST_LOC="Crimson Isle" ;;
                "mining_1") LAST_LOC="Gold Mine" ;;
                "mining_2") LAST_LOC="Deep Caverns" ;;
                "mining_3") LAST_LOC="Dwarven Mines" ;;
                "mining_4") LAST_LOC="Crystal Hollows" ;;
                "foraging_1") LAST_LOC="Park / Jungle" ;;
                "farming_1") LAST_LOC="The Barn" ;;
                "farming_2") LAST_LOC="Mushroom Desert" ;;
                "fishing_1") LAST_LOC="Fishing Pond" ;;
                "winter") LAST_LOC="Jerry's Workshop" ;;
                "private") LAST_LOC="Private Island" ;;
                "home") LAST_LOC="Private Island" ;;
                *) LAST_LOC="$RAW_LOC" ;;
              esac
              SAVE_MS=$(echo "$MEMBER" | jq -r '.last_save // 0')
              if [ "$SAVE_MS" != "0" ] && [ "$SAVE_MS" != "null" ]; then
                LAST_SAVE=$(date -d "@$((SAVE_MS / 1000))" +"%Y-%m-%d %H:%M:%S UTC")
              else
                LAST_SAVE="Unknown"
              fi
            else
              PROFILE_NAME="No SkyBlock profiles found"
              LEVEL="N/A"
              LAST_LOC="N/A"
              LAST_SAVE="N/A"
            fi
            
            {
              echo "## SkyBlock Player Lookup Results"
              echo ""
              echo "**Player:** $DISPLAY_NAME"
              echo ""
              echo "### Hypixel Network"
              echo "- **First Login:** $FIRST_ONLINE"
              echo "- **Last Online:** $LAST_ONLINE"
              echo ""
              echo "### SkyBlock (Latest Profile: $PROFILE_NAME)"
              echo "- **SkyBlock Level:** $LEVEL"
              echo "- **Last Island:** $LAST_LOC"
              echo "- **Last Save Time:** $LAST_SAVE"
            } > $SUMMARY
          fi

      - name: Display summary
        run: cat summary.md

      - name: Upload JSON artifacts
        if: steps.hypixel.outputs.player_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: skyblock-data
          path: |
            player.json
            profiles.json
          retention-days: 3
          if-no-files-found: ignore

      - name: Add to step summary
        run: cat summary.md >> $GITHUB_STEP_SUMMARY
