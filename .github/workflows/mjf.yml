name: Get Raw SkyBlock JSON

on:
  workflow_dispatch:
    inputs:
      player_name:
        description: 'Minecraft username (e.g., Technoblade)'
        required: true
        type: string

jobs:
  fetch-raw-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get UUID from Mojang
        id: uuid
        run: |
          USERNAME="${{ github.event.inputs.player_name }}"
          RESPONSE=$(curl --max-time 10 -s "https://api.mojang.com/users/profiles/minecraft/$USERNAME")
          UUID=$(echo "$RESPONSE" | jq -r '.id')
          if [ "$UUID" = "null" ] || [ -z "$UUID" ]; then
            echo "❌ Invalid username: $USERNAME"
            exit 1
          fi
          echo "uuid=$UUID" >> $GITHUB_OUTPUT
          echo "✅ UUID: $UUID"

      - name: Fetch SkyBlock Profiles (v2 – most complete)
        env:
          HYPIXEL_API_KEY: ${{ secrets.HYPIXEL_API_KEY }}
        run: |
          UUID="${{ steps.uuid.outputs.uuid }}"
          echo "Fetching SkyBlock profiles for $UUID..."
          curl -s -H "API-Key: $HYPIXEL_API_KEY" \
            "https://api.hypixel.net/v2/skyblock/profiles?key=$HYPIXEL_API_KEY&uuid=$UUID" \
            > skyblock_profiles_v2.json
          echo "✅ Saved: skyblock_profiles_v2.json"

      - name: Fetch Main Player Data (optional, includes Hypixel general stats)
        env:
          HYPIXEL_API_KEY: ${{ secrets.HYPIXEL_API_KEY }}
        run: |
          UUID="${{ steps.uuid.outputs.uuid }}"
          curl -s -H "API-Key: $HYPIXEL_API_KEY" \
            "https://api.hypixel.net/v2/player?key=$HYPIXEL_API_KEY&uuid=$UUID" \
            > player_data_v2.json
          echo "✅ Saved: player_data_v2.json"

      - name: Upload both JSON files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: raw-skyblock-json-${{ github.event.inputs.player_name }}
          path: |
            skyblock_profiles_v2.json
            player_data_v2.json
          retention-days: 7
          if-no-files-found: error
