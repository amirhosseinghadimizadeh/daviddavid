name: SkyBlock Full Report (UUID/Username)

on:
  workflow_dispatch:
    inputs:
      player_input:
        description: 'Minecraft username OR UUID (32 chars, no dashes)'
        required: true
        type: string

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse input (username or UUID)
        id: parse
        run: |
          INPUT="${{ github.event.inputs.player_input }}"
          if [[ "$INPUT" =~ ^[a-f0-9]{32}$ ]]; then
            echo "uuid=$INPUT" >> $GITHUB_OUTPUT
          else
            RESPONSE=$(curl --max-time 10 -s "https://api.mojang.com/users/profiles/minecraft/$INPUT")
            UUID=$(echo "$RESPONSE" | jq -r '.id')
            if [ "$UUID" = "null" ] || [ -z "$UUID" ]; then
              echo "Invalid username"
              exit 1
            fi
            echo "uuid=$UUID" >> $GITHUB_OUTPUT
          fi

      - name: Fetch SkyBlock Profiles
        env:
          HYPIXEL_API_KEY: ${{ secrets.HYPIXEL_API_KEY }}
        run: |
          UUID="${{ steps.parse.outputs.uuid }}"
          curl -s -o skyblock_profiles.json \
            -H "API-Key: $HYPIXEL_API_KEY" \
            "https://api.hypixel.net/v2/skyblock/profiles?key=$HYPIXEL_API_KEY&uuid=$UUID"

      - name: Fetch Player Data
        env:
          HYPIXEL_API_KEY: ${{ secrets.HYPIXEL_API_KEY }}
        run: |
          UUID="${{ steps.parse.outputs.uuid }}"
          curl -s -o player_data.json \
            -H "API-Key: $HYPIXEL_API_KEY" \
            "https://api.hypixel.net/v2/player?key=$HYPIXEL_API_KEY&uuid=$UUID"

      - name: Generate HTML Report
        run: |
          python3 << 'PYTHON_SCRIPT'
          import json
          from datetime import datetime, timezone

          # ---------- Load data ----------
          with open('skyblock_profiles.json') as f:
              profiles_data = json.load(f)
          with open('player_data.json') as f:
              player_data = json.load(f)

          # ---------- Player info ----------
          player = player_data.get('player', {})
          displayname = player.get('displayname', 'Unknown')
          uuid = player.get('uuid', '')
          first_login = player.get('firstLogin', 0)
          last_login = player.get('lastLogin', 0)
          network_exp = player.get('networkExp', 0)
          karma = player.get('karma', 0)
          achievement_points = player.get('achievementPoints', 0)
          rank = player.get('newPackageRank', 'NONE')
          if rank == 'MVP_PLUS':
              rank = 'MVP+' + (f" {player.get('rankPlusColor', '')}" if player.get('rankPlusColor') else '')
          elif rank == 'MVP':
              rank = 'MVP'
          elif rank == 'VIP_PLUS':
              rank = 'VIP+'
          elif rank == 'VIP':
              rank = 'VIP'

          def format_time(ts):
              if ts and ts > 0:
                  return datetime.fromtimestamp(ts/1000, tz=timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')
              return 'Never'

          first_login_str = format_time(first_login)
          last_login_str = format_time(last_login)

          # ---------- Selected profile ----------
          profiles = profiles_data.get('profiles', [])
          selected_profile = None
          for p in profiles:
              if p.get('selected'):
                  selected_profile = p
                  break
          if not selected_profile and profiles:
              selected_profile = profiles[0]

          member_data = {}
          if selected_profile:
              members = selected_profile.get('members', {})
              member_data = members.get(uuid, {})

          # ---------- Safe number formatter ----------
          def fmt(val):
              if isinstance(val, dict):
                  # try to extract 'current' or first numeric value
                  if 'current' in val:
                      val = val['current']
                  else:
                      for v in val.values():
                          if isinstance(v, (int, float)):
                              val = v
                              break
              try:
                  return f"{int(val):,}"
              except:
                  return str(val)

          # ---------- Skills ----------
          skills = member_data.get('experience', {})
          skill_map = {
              'SKILL_COMBAT': 'Combat',
              'SKILL_TAMING': 'Taming',
              'SKILL_ENCHANTING': 'Enchanting',
              'SKILL_MINING': 'Mining',
              'SKILL_FARMING': 'Farming',
              'SKILL_ALCHEMY': 'Alchemy',
              'SKILL_FORAGING': 'Foraging',
              'SKILL_CARPENTRY': 'Carpentry',
              'SKILL_FISHING': 'Fishing',
              'SKILL_RUNECRAFTING': 'Runecrafting',
              'SKILL_HUNTING': 'Hunting',
              'SKILL_SOCIAL': 'Social'
          }
          skill_levels = []
          for sk, name in skill_map.items():
              xp = skills.get(sk, 0)
              level = 0
              if xp > 0:
                  if name in ['Combat', 'Enchanting', 'Mining']:
                      level = min(60, int((xp / 14e6) * 60)) if xp < 14e6 else 60
                  else:
                      level = min(50, int((xp / 12e6) * 50)) if xp < 12e6 else 50
              skill_levels.append((name, xp, level))

          # ---------- Slayer ----------
          slayer = member_data.get('slayer', {}).get('slayer_bosses', {})
          slayer_list = []
          for boss, data in slayer.items():
              slayer_list.append((
                  boss.capitalize(),
                  data.get('xp', 0),
                  data.get('boss_kills_tier_4', 0),
                  data.get('boss_kills_tier_5', 0),
                  len(data.get('claimed_levels', {}))
              ))

          # ---------- Currencies (fix essence) ----------
          coin_purse = member_data.get('currencies', {}).get('coin_purse', 0)
          bank_balance = member_data.get('banking', {}).get('balance', 0)
          motes = member_data.get('currencies', {}).get('motes_purse', 0)
          soulflow = member_data.get('item_data', {}).get('soulflow', 0)
          essence = member_data.get('currencies', {}).get('essence', {})

          def get_essence(ess, typ):
              val = ess.get(typ, 0)
              if isinstance(val, dict):
                  return val.get('current', 0)
              return val

          diamond_essence = get_essence(essence, 'DIAMOND')
          gold_essence = get_essence(essence, 'GOLD')

          # ---------- Pets ----------
          pets = member_data.get('pets_data', {}).get('pets', [])
          top_pets = sorted(pets, key=lambda x: x.get('exp', 0), reverse=True)[:10]

          # ---------- Collections ----------
          collections = member_data.get('collection', {})
          top_collections = sorted(collections.items(), key=lambda x: x[1], reverse=True)[:10]

          # ---------- Inventory (base64) ----------
          def get_bag_data(path):
              parts = path.split('.')
              data = member_data
              for p in parts:
                  data = data.get(p, {})
              return data.get('data', '')

          inv_contents = get_bag_data('inv_contents')
          ender_chest = get_bag_data('ender_chest_contents')
          armor = get_bag_data('inv_armor')
          talisman_bag = get_bag_data('bag_contents.talisman_bag')
          quiver = get_bag_data('bag_contents.quiver')
          wardrobe = get_bag_data('wardrobe_contents')
          sacks = get_bag_data('bag_contents.sacks_bag')
          potion_bag = get_bag_data('bag_contents.potion_bag')
          fishing_bag = get_bag_data('bag_contents.fishing_bag')
          personal_vault = get_bag_data('personal_vault_contents')

          # ---------- Rift ----------
          rift = member_data.get('rift', {})
          rift_motes = member_data.get('currencies', {}).get('motes_purse', 0)
          enigma_souls = len(rift.get('enigma', {}).get('found_souls', []))
          gallery_trophies = len(rift.get('gallery', {}).get('secured_trophies', []))
          rift_visits = rift.get('visits', 0)

          # ---------- Dungeons ----------
          dungeons = member_data.get('dungeons', {})
          catacombs = dungeons.get('dungeon_types', {}).get('catacombs', {})
          master_catacombs = dungeons.get('dungeon_types', {}).get('master_catacombs', {})
          cata_exp = catacombs.get('experience', 0)
          cata_level = min(50, int(cata_exp / 15e6 * 50)) if cata_exp < 15e6 else 50
          master_exp = master_catacombs.get('experience', 0)
          master_level = min(50, int(master_exp / 20e6 * 50)) if master_exp < 20e6 else 50
          secrets = dungeons.get('secrets', 0)
          f7_completions = catacombs.get('tier_completions', {}).get('7', 0)

          # ---------- Accessories ----------
          mp = member_data.get('accessory_bag_storage', {}).get('highest_magical_power', 0)
          selected_power = member_data.get('accessory_bag_storage', {}).get('selected_power', 'None')
          unlocked_powers = member_data.get('accessory_bag_storage', {}).get('unlocked_powers', [])

          # ---------- SkyBlock Level ----------
          sb_level = member_data.get('leveling', {}).get('experience', 0)

          # ---------- Build HTML ----------
          html_lines = []
          html_lines.append(f'''<!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>SkyBlock Report · {displayname}</title>
              <style>
                  * {{ margin: 0; padding: 0; box-sizing: border-box; }}
                  body {{
                      background: #0b1120;
                      font-family: 'Segoe UI', system-ui, sans-serif;
                      padding: 2rem;
                      color: #e2e8f0;
                  }}
                  .container {{
                      max-width: 1400px;
                      margin: 0 auto;
                      background: #0f172ad9;
                      border-radius: 2rem;
                      backdrop-filter: blur(2px);
                      border: 1px solid #2d3a5e;
                      overflow: hidden;
                  }}
                  header {{
                      background: linear-gradient(135deg, #0f172a, #111827);
                      padding: 1.5rem 2rem;
                      border-bottom: 1px solid #facc1522;
                  }}
                  h1 {{
                      font-size: 2rem;
                      background: linear-gradient(120deg, #facc15, #eab308);
                      background-clip: text;
                      -webkit-background-clip: text;
                      color: transparent;
                  }}
                  .sub {{ color: #9ca3af; margin-top: 0.3rem; }}
                  .stat-grid {{
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
                      gap: 1.2rem;
                      padding: 1.5rem;
                  }}
                  .card {{
                      background: #111827cc;
                      border-radius: 1.2rem;
                      padding: 1.2rem;
                      border: 1px solid #2d3a5e;
                  }}
                  .card h3 {{
                      color: #facc15;
                      font-size: 1.2rem;
                      margin-bottom: 1rem;
                      border-left: 3px solid #facc15;
                      padding-left: 0.7rem;
                  }}
                  .stat-row {{
                      display: flex;
                      justify-content: space-between;
                      padding: 0.4rem 0;
                      border-bottom: 1px dashed #1e2a44;
                      font-size: 0.85rem;
                  }}
                  .badge {{
                      background: #facc1522;
                      color: #facc15;
                      padding: 0.2rem 0.6rem;
                      border-radius: 20px;
                      font-size: 0.7rem;
                  }}
                  .inventory-data {{
                      background: #0f172a;
                      padding: 0.8rem;
                      border-radius: 1rem;
                      font-family: monospace;
                      font-size: 0.65rem;
                      overflow-x: auto;
                      white-space: pre-wrap;
                      word-break: break-all;
                  }}
                  footer {{
                      text-align: center;
                      padding: 1rem;
                      font-size: 0.7rem;
                      border-top: 1px solid #1e2a44;
                      color: #5b6e8c;
                  }}
                  a {{ color: #facc15; }}
              </style>
          </head>
          <body>
          <div class="container">
              <header>
                  <h1>⛏️ SkyBlock Report · {displayname}</h1>
                  <div class="sub">UUID: {uuid} | Rank: {rank} | First login: {first_login_str} | Last login: {last_login_str}</div>
              </header>
              <div class="stat-grid">''')

          # General
          html_lines.append(f'''
                  <div class="card">
                      <h3>📊 General</h3>
                      <div class="stat-row"><span>Network Level</span><span>{int(network_exp/100000) if network_exp else 0}</span></div>
                      <div class="stat-row"><span>Achievement Points</span><span>{achievement_points}</span></div>
                      <div class="stat-row"><span>Karma</span><span>{fmt(karma)}</span></div>
                      <div class="stat-row"><span>SkyBlock Level</span><span>{sb_level}</span></div>
                      <div class="stat-row"><span>Magical Power</span><span>{mp}</span></div>
                      <div class="stat-row"><span>Selected Power</span><span>{selected_power}</span></div>
                  </div>''')

          # Currencies
          html_lines.append(f'''
                  <div class="card">
                      <h3>💰 Currencies</h3>
                      <div class="stat-row"><span>Coin Purse</span><span>{fmt(coin_purse)}</span></div>
                      <div class="stat-row"><span>Bank</span><span>{fmt(bank_balance)}</span></div>
                      <div class="stat-row"><span>Motes</span><span>{fmt(motes)}</span></div>
                      <div class="stat-row"><span>Soulflow</span><span>{fmt(soulflow)}</span></div>
                      <div class="stat-row"><span>Essence (Diamond/Gold)</span><span>{fmt(diamond_essence)} / {fmt(gold_essence)}</span></div>
                  </div>''')

          # Skills
          html_lines.append('<div class="card"><h3>⚔️ Skills</h3>')
          for name, xp, lvl in skill_levels:
              if xp > 0:
                  html_lines.append(f'<div class="stat-row"><span>{name}</span><span>Lvl {lvl} ({xp/1e6:.1f}M XP)</span></div>')
          html_lines.append('</div>')

          # Slayer
          html_lines.append('<div class="card"><h3>🧪 Slayer</h3>')
          for boss, xp, t4, t5, lvl in slayer_list:
              html_lines.append(f'<div class="stat-row"><span>{boss}</span><span>XP {xp/1000:.1f}k | Lvl {lvl} | T4/T5 kills {t4}/{t5}</span></div>')
          html_lines.append('</div>')

          # Dungeons
          html_lines.append(f'''
                  <div class="card">
                      <h3>🏰 Dungeons</h3>
                      <div class="stat-row"><span>Catacombs Level</span><span>{cata_level}</span></div>
                      <div class="stat-row"><span>Master Catacombs</span><span>{master_level}</span></div>
                      <div class="stat-row"><span>Secrets Found</span><span>{fmt(secrets)}</span></div>
                      <div class="stat-row"><span>F7 Completions</span><span>{fmt(f7_completions)}</span></div>
                  </div>''')

          # Rift
          html_lines.append(f'''
                  <div class="card">
                      <h3>🌀 Rift</h3>
                      <div class="stat-row"><span>Motes</span><span>{fmt(rift_motes)}</span></div>
                      <div class="stat-row"><span>Enigma Souls</span><span>{enigma_souls}</span></div>
                      <div class="stat-row"><span>Gallery Trophies</span><span>{gallery_trophies}</span></div>
                      <div class="stat-row"><span>Rift Visits</span><span>{rift_visits}</span></div>
                  </div>''')

          # Top Pets
          html_lines.append('<div class="card"><h3>🐾 Top Pets</h3>')
          for p in top_pets[:5]:
              pet_type = p.get('type', 'Unknown').replace('_', ' ').title()
              pet_exp = p.get('exp', 0)
              pet_level = int(pet_exp / 1e6) if pet_exp > 0 else 0
              pet_tier = p.get('tier', 'Common')
              html_lines.append(f'<div class="stat-row"><span>{pet_type}</span><span>Lvl {pet_level}M | {pet_tier}</span></div>')
          html_lines.append('</div>')

          # Top Collections
          html_lines.append('<div class="card"><h3>📦 Top Collections</h3>')
          for item, amount in top_collections[:5]:
              item_name = item.replace('_', ' ').title()
              html_lines.append(f'<div class="stat-row"><span>{item_name}</span><span>{fmt(amount)}</span></div>')
          html_lines.append('</div>')

          # Accessories
          html_lines.append(f'''
                  <div class="card">
                      <h3>🔮 Accessories</h3>
                      <div class="stat-row"><span>Magical Power</span><span>{mp}</span></div>
                      <div class="stat-row"><span>Selected Power</span><span>{selected_power}</span></div>
                      <div class="stat-row"><span>Unlocked Powers</span><span>{', '.join(unlocked_powers[:5])}{'...' if len(unlocked_powers) > 5 else ''}</span></div>
                  </div>''')

          # Inventory (Base64)
          def trunc(s, max_len=100):
              if not s:
                  return '(empty)'
              return s[:max_len] + ('...' if len(s) > max_len else '')

          html_lines.append(f'''
                  <div class="card">
                      <h3>🎒 Inventory Data (Base64)</h3>
                      <div class="inventory-data"><strong>inv_contents:</strong> {trunc(inv_contents)}</div>
                      <div class="inventory-data"><strong>ender_chest:</strong> {trunc(ender_chest)}</div>
                      <div class="inventory-data"><strong>armor:</strong> {trunc(armor)}</div>
                      <div class="inventory-data"><strong>talisman_bag:</strong> {trunc(talisman_bag)}</div>
                      <div class="inventory-data"><strong>quiver:</strong> {trunc(quiver)}</div>
                      <div class="inventory-data"><strong>wardrobe:</strong> {trunc(wardrobe)}</div>
                      <div class="inventory-data"><strong>sacks_bag:</strong> {trunc(sacks)}</div>
                      <div class="inventory-data"><strong>potion_bag:</strong> {trunc(potion_bag)}</div>
                      <div class="inventory-data"><strong>fishing_bag:</strong> {trunc(fishing_bag)}</div>
                      <div class="inventory-data"><strong>personal_vault:</strong> {trunc(personal_vault)}</div>
                      <div class="badge" style="margin-top:0.5rem;">🔐 Data is Base64‑encoded NBT. Use external tools to decode.</div>
                  </div>
              </div>
              <footer>Generated from Hypixel API (v2) · Data as of {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')}</footer>
          </div>
          </body>
          </html>''')

          with open('skyblock_report.html', 'w') as f:
              f.write('\n'.join(html_lines))

          print("✅ HTML report generated: skyblock_report.html")
          PYTHON_SCRIPT

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: skyblock-report-${{ github.event.inputs.player_input }}
          path: skyblock_report.html
          retention-days: 7
          if-no-files-found: error

      - name: Upload raw JSON (optional)
        uses: actions/upload-artifact@v4
        with:
          name: raw-json-files-${{ github.event.inputs.player_input }}
          path: |
            skyblock_profiles.json
            player_data.json
          retention-days: 3
          if-no-files-found: ignore
