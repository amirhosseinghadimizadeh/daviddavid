name: SkyBlock Full Report with GUI Inventory

on:
  workflow_dispatch:
    inputs:
      player_input:
        description: 'Minecraft username OR UUID (32 chars, no dashes)'
        required: true
        type: string

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse input (username or UUID)
        id: parse
        run: |
          INPUT="${{ github.event.inputs.player_input }}"
          if [[ "$INPUT" =~ ^[a-f0-9]{32}$ ]]; then
            echo "uuid=$INPUT" >> $GITHUB_OUTPUT
          else
            RESPONSE=$(curl --max-time 10 -s "https://api.mojang.com/users/profiles/minecraft/$INPUT")
            UUID=$(echo "$RESPONSE" | jq -r '.id')
            if [ "$UUID" = "null" ] || [ -z "$UUID" ]; then
              echo "Invalid username"
              exit 1
            fi
            echo "uuid=$UUID" >> $GITHUB_OUTPUT
          fi

      - name: Fetch SkyBlock Profiles (v2)
        env:
          HYPIXEL_API_KEY: ${{ secrets.HYPIXEL_API_KEY }}
        run: |
          UUID="${{ steps.parse.outputs.uuid }}"
          curl -s -o skyblock_profiles.json \
            -H "API-Key: $HYPIXEL_API_KEY" \
            "https://api.hypixel.net/v2/skyblock/profiles?key=$HYPIXEL_API_KEY&uuid=$UUID"

      - name: Fetch Player Data (v2)
        env:
          HYPIXEL_API_KEY: ${{ secrets.HYPIXEL_API_KEY }}
        run: |
          UUID="${{ steps.parse.outputs.uuid }}"
          curl -s -o player_data.json \
            -H "API-Key: $HYPIXEL_API_KEY" \
            "https://api.hypixel.net/v2/player?key=$HYPIXEL_API_KEY&uuid=$UUID"

      - name: Generate HTML Report (Python)
        run: |
          python3 << 'PYTHON_SCRIPT'
          import json
          import base64
          import struct
          from datetime import datetime, timezone
          from collections import OrderedDict

          # ---------- NBT parsing (pure Python, no dependencies) ----------
          def read_nbt_string(data, offset):
              length = struct.unpack('>H', data[offset:offset+2])[0]
              offset += 2
              string = data[offset:offset+length].decode('utf-8')
              return string, offset + length

          def parse_nbt_payload(data, offset, end_offset, depth=0):
              items = OrderedDict()
              while offset < end_offset:
                  if depth > 100:  # safety
                      break
                  tag_type = data[offset]
                  offset += 1
                  if tag_type == 0:  # TAG_End
                      break
                  # read name
                  try:
                      name, offset = read_nbt_string(data, offset)
                  except:
                      break
                  # read value based on type
                  try:
                      if tag_type == 1:   # TAG_Byte
                          value = struct.unpack('b', data[offset:offset+1])[0]
                          offset += 1
                      elif tag_type == 2: # TAG_Short
                          value = struct.unpack('>h', data[offset:offset+2])[0]
                          offset += 2
                      elif tag_type == 3: # TAG_Int
                          value = struct.unpack('>i', data[offset:offset+4])[0]
                          offset += 4
                      elif tag_type == 4: # TAG_Long
                          value = struct.unpack('>q', data[offset:offset+8])[0]
                          offset += 8
                      elif tag_type == 5: # TAG_Float
                          value = struct.unpack('>f', data[offset:offset+4])[0]
                          offset += 4
                      elif tag_type == 6: # TAG_Double
                          value = struct.unpack('>d', data[offset:offset+8])[0]
                          offset += 8
                      elif tag_type == 7: # TAG_Byte_Array
                          length = struct.unpack('>i', data[offset:offset+4])[0]
                          offset += 4
                          value = data[offset:offset+length]
                          offset += length
                      elif tag_type == 8: # TAG_String
                          value, offset = read_nbt_string(data, offset)
                      elif tag_type == 9: # TAG_List
                          list_type = data[offset]
                          offset += 1
                          list_len = struct.unpack('>i', data[offset:offset+4])[0]
                          offset += 4
                          list_items = []
                          for _ in range(list_len):
                              if list_type == 0:
                                  break
                              sub_val, offset = parse_nbt_payload(data, offset, end_offset, depth+1)
                              list_items.append(sub_val)
                          value = list_items
                      elif tag_type == 10: # TAG_Compound
                          value, offset = parse_nbt_payload(data, offset, end_offset, depth+1)
                      else:
                          # unknown tag, skip
                          break
                  except:
                      break
                  items[name] = value
              return items, offset

          def parse_nbt(data_bytes):
              if not data_bytes or data_bytes[0] != 10:
                  return {}
              try:
                  offset = 1
                  name, offset = read_nbt_string(data_bytes, offset)
                  result, offset = parse_nbt_payload(data_bytes, offset, len(data_bytes))
                  return result
              except Exception:
                  return {}

          def decode_inventory(b64_data):
              if not b64_data:
                  return []
              try:
                  data_bytes = base64.b64decode(b64_data)
                  nbt = parse_nbt(data_bytes)
                  items_raw = nbt.get('i', [])
                  if not isinstance(items_raw, list):
                      return []
                  slot_items = []
                  for entry in items_raw:
                      if not isinstance(entry, dict):
                          continue
                      slot = entry.get('Slot', 0)
                      if isinstance(slot, dict):
                          slot = slot.get('value', 0)
                      item_id = entry.get('id', '')
                      if isinstance(item_id, dict):
                          item_id = item_id.get('value', '')
                      count = entry.get('Count', 1)
                      if isinstance(count, dict):
                          count = count.get('value', 1)
                      if item_id:
                          slot_items.append({'slot': int(slot), 'id': str(item_id), 'count': int(count)})
                  return slot_items
              except Exception:
                  return []

          # ---------- Load JSON data ----------
          with open('skyblock_profiles.json') as f:
              profiles_data = json.load(f)
          with open('player_data.json') as f:
              player_data = json.load(f)

          # ---------- Player info ----------
          player = player_data.get('player', {})
          displayname = player.get('displayname', 'Unknown')
          uuid = player.get('uuid', '')
          first_login = player.get('firstLogin', 0)
          last_login = player.get('lastLogin', 0)
          network_exp = player.get('networkExp', 0)
          karma = player.get('karma', 0)
          achievement_points = player.get('achievementPoints', 0)
          rank = player.get('newPackageRank', 'NONE')
          if rank == 'MVP_PLUS':
              rank = 'MVP+' + (f" {player.get('rankPlusColor', '')}" if player.get('rankPlusColor') else '')
          elif rank == 'MVP':
              rank = 'MVP'
          elif rank == 'VIP_PLUS':
              rank = 'VIP+'
          elif rank == 'VIP':
              rank = 'VIP'

          def format_time(ts):
              if ts and ts > 0:
                  return datetime.fromtimestamp(ts/1000, tz=timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')
              return 'Never'

          first_login_str = format_time(first_login)
          last_login_str = format_time(last_login)

          # ---------- Selected profile ----------
          profiles = profiles_data.get('profiles', [])
          selected_profile = None
          for p in profiles:
              if p.get('selected'):
                  selected_profile = p
                  break
          if not selected_profile and profiles:
              selected_profile = profiles[0]

          member_data = {}
          if selected_profile:
              members = selected_profile.get('members', {})
              member_data = members.get(uuid, {})

          # ---------- Helper ----------
          def fmt(val):
              if isinstance(val, dict):
                  if 'current' in val:
                      val = val['current']
                  elif 'value' in val:
                      val = val['value']
                  else:
                      for v in val.values():
                          if isinstance(v, (int, float)):
                              val = v
                              break
              try:
                  return f"{int(val):,}"
              except:
                  return str(val)

          # ---------- Skills ----------
          skills = member_data.get('experience', {})
          skill_display = {
              'SKILL_COMBAT': 'Combat', 'SKILL_TAMING': 'Taming',
              'SKILL_ENCHANTING': 'Enchanting', 'SKILL_MINING': 'Mining',
              'SKILL_FARMING': 'Farming', 'SKILL_ALCHEMY': 'Alchemy',
              'SKILL_FORAGING': 'Foraging', 'SKILL_CARPENTRY': 'Carpentry',
              'SKILL_FISHING': 'Fishing', 'SKILL_RUNECRAFTING': 'Runecrafting',
              'SKILL_HUNTING': 'Hunting', 'SKILL_SOCIAL': 'Social'
          }
          skill_list = []
          for sk, name in skill_display.items():
              xp = skills.get(sk, 0)
              if xp == 0:
                  continue
              if name in ['Combat', 'Enchanting', 'Mining']:
                  level = min(60, int((xp / 14e6) * 60)) if xp < 14e6 else 60
              else:
                  level = min(50, int((xp / 12e6) * 50)) if xp < 12e6 else 50
              percent = min(100, (xp / 111672500) * 100) if name not in ['Runecrafting', 'Hunting', 'Social'] else min(100, (xp / 20000000) * 100)
              skill_list.append((name, xp, level, percent))

          # ---------- Slayer ----------
          slayer = member_data.get('slayer', {}).get('slayer_bosses', {})
          slayer_list = []
          for boss, data in slayer.items():
              xp = data.get('xp', 0)
              percent = min(100, (xp / 10000000) * 100) if xp < 10000000 else 100
              slayer_list.append((
                  boss.capitalize(),
                  xp,
                  data.get('boss_kills_tier_4', 0),
                  data.get('boss_kills_tier_5', 0),
                  len(data.get('claimed_levels', {})),
                  percent
              ))

          # ---------- Currencies ----------
          coin_purse = member_data.get('currencies', {}).get('coin_purse', 0)
          bank_balance = member_data.get('banking', {}).get('balance', 0)
          motes = member_data.get('currencies', {}).get('motes_purse', 0)
          soulflow = member_data.get('item_data', {}).get('soulflow', 0)
          essence = member_data.get('currencies', {}).get('essence', {})
          diamond_essence = essence.get('DIAMOND', 0)
          gold_essence = essence.get('GOLD', 0)
          if isinstance(diamond_essence, dict):
              diamond_essence = diamond_essence.get('current', 0)
          if isinstance(gold_essence, dict):
              gold_essence = gold_essence.get('current', 0)

          # ---------- Pets ----------
          pets = member_data.get('pets_data', {}).get('pets', [])
          top_pets = sorted(pets, key=lambda x: x.get('exp', 0), reverse=True)[:15]

          # ---------- Collections ----------
          collections = member_data.get('collection', {})
          all_collections = sorted(collections.items(), key=lambda x: x[1], reverse=True)[:30]

          # ---------- Inventory (Base64) ----------
          def get_bag_data(*keys):
              data = member_data
              for k in keys:
                  data = data.get(k, {})
              return data.get('data', '')

          inv_b64 = get_bag_data('inv_contents')
          ender_b64 = get_bag_data('ender_chest_contents')
          armor_b64 = get_bag_data('inv_armor')

          inv_items = decode_inventory(inv_b64)
          ender_items = decode_inventory(ender_b64)
          armor_items = decode_inventory(armor_b64)

          def render_inventory_grid(items, rows, cols):
              slot_map = {item['slot']: item for item in items}
              html = '<div class="inventory-grid">'
              for i in range(rows * cols):
                  item = slot_map.get(i)
                  if item:
                      item_name = item['id'].split(':')[-1].replace('_', ' ').title()
                      if not item_name:
                          item_name = "Item"
                      count = item['count']
                      html += f'<div class="inventory-slot"><div class="item-name">{item_name}</div><div class="item-count">{count}</div></div>'
                  else:
                      html += '<div class="inventory-slot empty"><div class="item-name">Empty</div></div>'
              html += '</div>'
              return html

          # ---------- Mining ----------
          mining_core = member_data.get('mining_core', {})
          powder_mithril = mining_core.get('powder_mithril', 0)
          powder_gemstone = mining_core.get('powder_gemstone', 0)
          powder_glacite = mining_core.get('powder_glacite', 0)
          crystals = mining_core.get('crystals', {})
          crystal_list = [c.capitalize() for c, d in crystals.items() if isinstance(d, dict) and d.get('state') == 'FOUND']

          # ---------- Rift ----------
          rift = member_data.get('rift', {})
          rift_motes = member_data.get('currencies', {}).get('motes_purse', 0)
          enigma_souls = len(rift.get('enigma', {}).get('found_souls', []))
          gallery_trophies = len(rift.get('gallery', {}).get('secured_trophies', []))
          rift_visits = rift.get('visits', 0)

          # ---------- Dungeons ----------
          dungeons = member_data.get('dungeons', {})
          catacombs = dungeons.get('dungeon_types', {}).get('catacombs', {})
          master_catacombs = dungeons.get('dungeon_types', {}).get('master_catacombs', {})
          cata_exp = catacombs.get('experience', 0)
          cata_level = min(50, int(cata_exp / 15e6 * 50)) if cata_exp < 15e6 else 50
          master_exp = master_catacombs.get('experience', 0)
          master_level = min(50, int(master_exp / 20e6 * 50)) if master_exp < 20e6 else 50
          secrets = dungeons.get('secrets', 0)
          f7_completions = catacombs.get('tier_completions', {}).get('7', 0)

          # ---------- Accessories ----------
          mp = member_data.get('accessory_bag_storage', {}).get('highest_magical_power', 0)
          selected_power = member_data.get('accessory_bag_storage', {}).get('selected_power', 'None')
          unlocked_powers = member_data.get('accessory_bag_storage', {}).get('unlocked_powers', [])
          bag_upgrades = member_data.get('accessory_bag_storage', {}).get('bag_upgrades_purchased', 0)

          # ---------- SkyBlock Level ----------
          sb_level = member_data.get('leveling', {}).get('experience', 0)
          if sb_level == 0:
              sb_level = sum([lvl for _, _, lvl, _ in skill_list]) * 2

          # ---------- Build HTML ----------
          html = f'''<!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>SkyBlock Report · {displayname}</title>
              <style>
                  * {{ margin: 0; padding: 0; box-sizing: border-box; }}
                  body {{
                      background: #0b1120;
                      font-family: 'Segoe UI', system-ui, sans-serif;
                      padding: 2rem;
                      color: #e2e8f0;
                  }}
                  .container {{
                      max-width: 1600px;
                      margin: 0 auto;
                      background: #0f172ad9;
                      border-radius: 2rem;
                      backdrop-filter: blur(2px);
                      border: 1px solid #2d3a5e;
                      overflow: hidden;
                  }}
                  header {{
                      background: linear-gradient(135deg, #0f172a, #111827);
                      padding: 1.5rem 2rem;
                      border-bottom: 1px solid #facc1522;
                  }}
                  h1 {{
                      font-size: 2rem;
                      background: linear-gradient(120deg, #facc15, #eab308);
                      background-clip: text;
                      -webkit-background-clip: text;
                      color: transparent;
                  }}
                  .sub {{ color: #9ca3af; margin-top: 0.3rem; }}
                  .tabs {{
                      display: flex;
                      flex-wrap: wrap;
                      background: #0f172a;
                      border-bottom: 1px solid #1e2a44;
                      padding: 0.5rem 1.5rem 0 1.5rem;
                      gap: 0.25rem;
                  }}
                  .tab-btn {{
                      background: transparent;
                      border: none;
                      color: #9ca3af;
                      font-weight: 600;
                      font-size: 0.9rem;
                      padding: 0.7rem 1.2rem;
                      cursor: pointer;
                      border-radius: 2rem 2rem 0 0;
                      transition: 0.2s;
                  }}
                  .tab-btn:hover {{ color: #facc15; background: #1e2a44; }}
                  .tab-btn.active {{
                      background: #1e2a44;
                      color: #facc15;
                      box-shadow: 0 -2px 0 #facc15 inset;
                  }}
                  .tab-content {{
                      display: none;
                      padding: 2rem 1.8rem;
                      animation: fade 0.2s ease;
                  }}
                  .tab-content.active {{ display: block; }}
                  @keyframes fade {{
                      from {{ opacity: 0; transform: translateY(6px); }}
                      to {{ opacity: 1; transform: translateY(0); }}
                  }}
                  .stat-grid {{
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
                      gap: 1.2rem;
                  }}
                  .card {{
                      background: #111827cc;
                      border-radius: 1.2rem;
                      padding: 1.2rem;
                      border: 1px solid #2d3a5e;
                  }}
                  .card h3 {{
                      color: #facc15;
                      font-size: 1.2rem;
                      margin-bottom: 1rem;
                      border-left: 3px solid #facc15;
                      padding-left: 0.7rem;
                  }}
                  .stat-row {{
                      display: flex;
                      justify-content: space-between;
                      padding: 0.4rem 0;
                      border-bottom: 1px dashed #1e2a44;
                      font-size: 0.85rem;
                  }}
                  .progress-bar {{
                      background: #1e293b;
                      border-radius: 12px;
                      height: 8px;
                      overflow: hidden;
                      margin-top: 4px;
                  }}
                  .progress-fill {{
                      background: linear-gradient(90deg, #facc15, #f59e0b);
                      height: 100%;
                      border-radius: 12px;
                  }}
                  .badge {{
                      background: #facc1522;
                      color: #facc15;
                      padding: 0.2rem 0.6rem;
                      border-radius: 20px;
                      font-size: 0.7rem;
                  }}
                  .inventory-grid {{
                      display: grid;
                      grid-template-columns: repeat(9, 1fr);
                      gap: 4px;
                      background: #1e293b;
                      padding: 0.8rem;
                      border-radius: 1rem;
                      margin-bottom: 1rem;
                  }}
                  .inventory-slot {{
                      background: #0f172a;
                      border: 1px solid #334155;
                      border-radius: 8px;
                      aspect-ratio: 1;
                      display: flex;
                      flex-direction: column;
                      align-items: center;
                      justify-content: center;
                      font-size: 0.65rem;
                      text-align: center;
                      padding: 4px;
                  }}
                  .inventory-slot.empty {{
                      opacity: 0.5;
                  }}
                  .item-name {{
                      font-size: 0.6rem;
                      word-break: break-word;
                  }}
                  .item-count {{
                      font-size: 0.65rem;
                      font-weight: bold;
                      margin-top: 2px;
                  }}
                  footer {{
                      text-align: center;
                      padding: 1rem;
                      font-size: 0.7rem;
                      border-top: 1px solid #1e2a44;
                      color: #5b6e8c;
                  }}
                  a {{ color: #facc15; }}
              </style>
          </head>
          <body>
          <div class="container">
              <header>
                  <h1>⛏️ SkyBlock Report · {displayname}</h1>
                  <div class="sub">UUID: {uuid} | Rank: {rank} | First login: {first_login_str} | Last login: {last_login_str}</div>
              </header>
              <div class="tabs">
                  <button class="tab-btn active" data-tab="general">📊 General</button>
                  <button class="tab-btn" data-tab="skills">⚔️ Skills</button>
                  <button class="tab-btn" data-tab="slayer">🧪 Slayer</button>
                  <button class="tab-btn" data-tab="dungeons">🏰 Dungeons</button>
                  <button class="tab-btn" data-tab="mining">⛏️ Mining</button>
                  <button class="tab-btn" data-tab="rift">🌀 Rift</button>
                  <button class="tab-btn" data-tab="pets">🐾 Pets</button>
                  <button class="tab-btn" data-tab="collections">📦 Collections</button>
                  <button class="tab-btn" data-tab="accessories">🔮 Accessories</button>
                  <button class="tab-btn" data-tab="inventory">🎒 Inventory</button>
              </div>

              <!-- General Tab -->
              <div id="general" class="tab-content active">
                  <div class="stat-grid">
                      <div class="card">
                          <h3>📊 General Stats</h3>
                          <div class="stat-row"><span>Network Level</span><span>{int(network_exp/100000) if network_exp else 0}</span></div>
                          <div class="stat-row"><span>Achievement Points</span><span>{achievement_points}</span></div>
                          <div class="stat-row"><span>Karma</span><span>{fmt(karma)}</span></div>
                          <div class="stat-row"><span>SkyBlock Level</span><span>{sb_level}</span></div>
                          <div class="stat-row"><span>Magical Power</span><span>{mp}</span></div>
                          <div class="stat-row"><span>Selected Power</span><span>{selected_power}</span></div>
                      </div>
                      <div class="card">
                          <h3>💰 Currencies</h3>
                          <div class="stat-row"><span>Coin Purse</span><span>{fmt(coin_purse)}</span></div>
                          <div class="stat-row"><span>Bank</span><span>{fmt(bank_balance)}</span></div>
                          <div class="stat-row"><span>Motes</span><span>{fmt(motes)}</span></div>
                          <div class="stat-row"><span>Soulflow</span><span>{fmt(soulflow)}</span></div>
                          <div class="stat-row"><span>Diamond Essence</span><span>{fmt(diamond_essence)}</span></div>
                          <div class="stat-row"><span>Gold Essence</span><span>{fmt(gold_essence)}</span></div>
                      </div>
                  </div>
              </div>

              <!-- Skills Tab -->
              <div id="skills" class="tab-content">
                  <div class="card"><h3>⚔️ Skills</h3>'''
          for name, xp, lvl, percent in skill_list:
              html += f'''
                      <div class="skill-row">
                          <div class="stat-row"><span>{name}</span><span>Lvl {lvl} ({xp/1e6:.1f}M XP)</span></div>
                          <div class="progress-bar"><div class="progress-fill" style="width:{percent}%"></div></div>
                      </div>'''
          html += '</div></div>'

          # Slayer Tab
          html += '<div id="slayer" class="tab-content"><div class="card"><h3>🧪 Slayer</h3>'
          for boss, xp, t4, t5, lvl, percent in slayer_list:
              html += f'''
                      <div class="skill-row">
                          <div class="stat-row"><span>{boss}</span><span>XP {xp/1000:.1f}k | Lvl {lvl} | T4/T5 kills {t4}/{t5}</span></div>
                          <div class="progress-bar"><div class="progress-fill" style="width:{percent}%"></div></div>
                      </div>'''
          html += '</div></div>'

          # Dungeons Tab
          html += f'''
              <div id="dungeons" class="tab-content">
                  <div class="stat-grid">
                      <div class="card">
                          <h3>🏰 Catacombs</h3>
                          <div class="stat-row"><span>Level</span><span>{cata_level}</span></div>
                          <div class="stat-row"><span>Experience</span><span>{fmt(cata_exp)}</span></div>
                          <div class="stat-row"><span>F7 Completions</span><span>{fmt(f7_completions)}</span></div>
                          <div class="stat-row"><span>Secrets Found</span><span>{fmt(secrets)}</span></div>
                      </div>
                      <div class="card">
                          <h3>👑 Master Mode</h3>
                          <div class="stat-row"><span>Level</span><span>{master_level}</span></div>
                          <div class="stat-row"><span>Experience</span><span>{fmt(master_exp)}</span></div>
                      </div>
                  </div>
              </div>'''

          # Mining Tab
          html += f'''
              <div id="mining" class="tab-content">
                  <div class="stat-grid">
                      <div class="card">
                          <h3>⛏️ Powder</h3>
                          <div class="stat-row"><span>Mithril Powder</span><span>{fmt(powder_mithril)}</span></div>
                          <div class="stat-row"><span>Gemstone Powder</span><span>{fmt(powder_gemstone)}</span></div>
                          <div class="stat-row"><span>Glacite Powder</span><span>{fmt(powder_glacite)}</span></div>
                      </div>
                      <div class="card">
                          <h3>💎 Crystals Found</h3>
                          <div class="stat-row"><span>{', '.join(crystal_list) if crystal_list else 'None'}</span></div>
                      </div>
                  </div>
              </div>'''

          # Rift Tab
          html += f'''
              <div id="rift" class="tab-content">
                  <div class="card">
                      <h3>🌀 Rift Progress</h3>
                      <div class="stat-row"><span>Motes</span><span>{fmt(rift_motes)}</span></div>
                      <div class="stat-row"><span>Enigma Souls</span><span>{enigma_souls}/52</span></div>
                      <div class="stat-row"><span>Gallery Trophies</span><span>{gallery_trophies}/8</span></div>
                      <div class="stat-row"><span>Visits</span><span>{rift_visits}</span></div>
                  </div>
              </div>'''

          # Pets Tab
          html += '<div id="pets" class="tab-content"><div class="card"><h3>🐾 Top 15 Pets</h3>'
          for p in top_pets[:15]:
              pet_type = p.get('type', 'Unknown').replace('_', ' ').title()
              pet_exp = p.get('exp', 0)
              pet_level = int(pet_exp / 1e6) if pet_exp > 0 else 0
              pet_tier = p.get('tier', 'Common')
              html += f'<div class="stat-row"><span>{pet_type}</span><span>Lvl {pet_level}M | {pet_tier}</span></div>'
          html += '</div></div>'

          # Collections Tab
          html += '<div id="collections" class="tab-content"><div class="card"><h3>📦 Top 30 Collections</h3>'
          for item, amount in all_collections[:30]:
              item_name = item.replace('_', ' ').title()
              html += f'<div class="stat-row"><span>{item_name}</span><span>{fmt(amount)}</span></div>'
          html += '</div></div>'

          # Accessories Tab
          html += f'''
              <div id="accessories" class="tab-content">
                  <div class="card">
                      <h3>🔮 Accessory Bag</h3>
                      <div class="stat-row"><span>Magical Power</span><span>{mp}</span></div>
                      <div class="stat-row"><span>Selected Power</span><span>{selected_power}</span></div>
                      <div class="stat-row"><span>Bag Upgrades</span><span>{bag_upgrades}/34</span></div>
                      <div class="stat-row"><span>Unlocked Powers</span><span>{', '.join(unlocked_powers[:8])}{'...' if len(unlocked_powers) > 8 else ''}</span></div>
                  </div>
              </div>'''

          # Inventory Tab
          html += f'''
              <div id="inventory" class="tab-content">
                  <div class="card">
                      <h3>🎒 Inventory (Main)</h3>
                      {render_inventory_grid(inv_items, 5, 9)}
                  </div>
                  <div class="card">
                      <h3>📦 Ender Chest</h3>
                      {render_inventory_grid(ender_items, 5, 9)}
                  </div>
                  <div class="card">
                      <h3>🛡️ Armor & Equipment</h3>
                      {render_inventory_grid(armor_items, 1, 4)}
                  </div>
                  <div class="badge">🔐 Items are decoded from NBT data.</div>
              </div>
              <footer>Generated from Hypixel API (v2) · Data as of {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')}</footer>
          </div>
          <script>
              document.querySelectorAll('.tab-btn').forEach(btn => {{
                  btn.addEventListener('click', () => {{
                      const tabId = btn.getAttribute('data-tab');
                      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                      document.getElementById(tabId).classList.add('active');
                      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                      btn.classList.add('active');
                  }});
              }});
          </script>
          </body>
          </html>'''

          with open('skyblock_report.html', 'w') as f:
              f.write(html)

          print("✅ HTML report generated: skyblock_report.html")
          PYTHON_SCRIPT

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: skyblock-report-${{ github.event.inputs.player_input }}
          path: skyblock_report.html
          retention-days: 7
          if-no-files-found: error

      - name: Upload raw JSON (optional)
        uses: actions/upload-artifact@v4
        with:
          name: raw-json-files-${{ github.event.inputs.player_input }}
          path: |
            skyblock_profiles.json
            player_data.json
          retention-days: 3
          if-no-files-found: ignore
