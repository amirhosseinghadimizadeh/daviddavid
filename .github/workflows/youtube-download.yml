name: YouTube Downloader (with Impersonate)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL'
        required: true
        type: string
      format:
        description: 'video or audio'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio
      filename:
        description: 'Output name (optional, no extension)'
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install Node.js (required for JS runtime)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yt-dlp with curl_cffi (for impersonation)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install yt-dlp curl_cffi

      - name: Set filename
        run: |
          if [ -z "${{ inputs.filename }}" ]; then
            FILENAME="youtube_video"
          else
            FILENAME="${{ inputs.filename }}"
          fi
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Download video
        if: inputs.format == 'video'
        run: |
          yt-dlp --impersonate chrome \
            --js-runtimes node \
            -f best \
            -o "${{ env.FILENAME }}.%(ext)s" \
            "${{ inputs.video_url }}"
          ACTUAL_FILE=$(ls "${{ env.FILENAME }}".* 2>/dev/null | head -1)
          if [ -z "$ACTUAL_FILE" ]; then
            echo "ERROR: No file downloaded"
            exit 1
          fi
          echo "ACTUAL_FILE=$ACTUAL_FILE" >> $GITHUB_ENV

      - name: Download audio
        if: inputs.format == 'audio'
        run: |
          yt-dlp --impersonate chrome \
            --js-runtimes node \
            -f bestaudio \
            --extract-audio \
            --audio-format mp3 \
            -o "${{ env.FILENAME }}.%(ext)s" \
            "${{ inputs.video_url }}"
          ACTUAL_FILE=$(ls "${{ env.FILENAME }}".* 2>/dev/null | head -1)
          if [ -z "$ACTUAL_FILE" ]; then
            echo "ERROR: No audio file downloaded"
            exit 1
          fi
          echo "ACTUAL_FILE=$ACTUAL_FILE" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download
          path: ${{ env.ACTUAL_FILE }}
          retention-days: 90
