name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL (e.g., https://youtu.be/... or https://www.youtube.com/watch?v=...)'
        required: true
        type: string
      format:
        description: 'Format: video (best) or audio (mp3)'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio
      filename:
        description: 'Output filename (without extension, optional)'
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Set filename
        run: |
          if [ -z "${{ inputs.filename }}" ]; then
            # Use video title as filename (safe characters only)
            FILENAME="youtube_video"
          else
            FILENAME="${{ inputs.filename }}"
          fi
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Download YouTube video
        if: inputs.format == 'video'
        run: |
          yt-dlp -f best \
            -o "${{ env.FILENAME }}.%(ext)s" \
            "${{ inputs.video_url }}"
          # Find the actual output file (extension unknown)
          ACTUAL_FILE=$(ls "${{ env.FILENAME }}".* 2>/dev/null | head -1)
          echo "ACTUAL_FILE=$ACTUAL_FILE" >> $GITHUB_ENV

      - name: Download YouTube audio as MP3
        if: inputs.format == 'audio'
        run: |
          yt-dlp -f bestaudio \
            --extract-audio \
            --audio-format mp3 \
            -o "${{ env.FILENAME }}.%(ext)s" \
            "${{ inputs.video_url }}"
          ACTUAL_FILE=$(ls "${{ env.FILENAME }}".* 2>/dev/null | head -1)
          echo "ACTUAL_FILE=$ACTUAL_FILE" >> $GITHUB_ENV

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download
          path: ${{ env.ACTUAL_FILE }}
          retention-days: 90
