name: Download Any Torrent from Magnet

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Paste your magnet link here'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install aria2
        run: sudo apt-get update && sudo apt-get install -y aria2

      - name: Download torrent
        run: |
          mkdir -p download
          cd download
          aria2c --seed-time=0 --follow-torrent=mem "${{ github.event.inputs.magnet_link }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: torrent-download
          path: download/
          retention-days: 1
