name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Download via Invidious (fallback instances)
        run: |
          ID=$(echo "${{ github.event.inputs.url }}" | grep -oE 'v=([^&]+)' | cut -d= -f2)
          INSTANCES=("https://yewtu.be" "https://inv.vern.cc" "https://invidious.fdn.fr")
          for INST in "${INSTANCES[@]}"; do
            yt-dlp --extractor-args "invidious:url=$INST" -f best -o "video.mp4" "${{ github.event.inputs.url }}" && break
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: video.mp4
