name: Open URL and Screenshot

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL (e.g., https://example.com)'
        required: true
        type: string

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Create screenshot script
        run: |
          cat > take-screenshot.mjs << 'EOF'
          import puppeteer from 'puppeteer';
          import { existsSync, mkdirSync } from 'fs';

          const url = process.argv[2];
          if (!url) {
            console.error('No URL provided');
            process.exit(1);
          }

          console.log(`Launching browser...`);
          const browser = await puppeteer.launch({ headless: true });
          const page = await browser.newPage();
          
          console.log(`Navigating to ${url}...`);
          await page.goto(url, { waitUntil: 'networkidle2', timeout: 30000 });
          
          console.log(`Taking full-page screenshot...`);
          await page.screenshot({ path: 'screenshot.png', fullPage: true });
          
          await browser.close();
          console.log('Done. Screenshot saved as screenshot.png');
          EOF

      - name: Run screenshot
        run: node take-screenshot.mjs "${{ inputs.url }}"

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: webpage-screenshot
          path: screenshot.png
          retention-days: 7
