name: YouTube Downloader (POT Token)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
        type: string
      format:
        description: 'Format to download'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      # This action sets up yt-dlp, ffmpeg, and crucially, the POT Token plugin
      - name: Setup yt-dlp with POT Token
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ffmpeg: true
          ejs-node: true
          pot-provider: true # This line is the key to fixing the bot detection

      - name: Download YouTube Video
        if: inputs.format == 'video'
        run: |
          # Use the 'use_po_token' extractor argument to bypass the bot check
          yt-dlp --force-ipv4 \
                 --extractor-args "youtube:use_po_token=true" \
                 -f "bestvideo+bestaudio/best" \
                 -o "%(title)s.%(ext)s" \
                 "${{ inputs.video_url }}"
          echo "OUT_FILE=$(ls *.mp4 *.webm *.mkv | head -1)" >> $GITHUB_ENV

      - name: Download YouTube Audio
        if: inputs.format == 'audio'
        run: |
          yt-dlp --force-ipv4 \
                 --extractor-args "youtube:use_po_token=true" \
                 -f "bestaudio" \
                 --extract-audio --audio-format mp3 \
                 -o "%(title)s.%(ext)s" \
                 "${{ inputs.video_url }}"
          echo "OUT_FILE=$(ls *.mp3 | head -1)" >> $GITHUB_ENV

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download
          path: ${{ env.OUT_FILE }}
          retention-days: 90
