name: YouTube Download via Invidious

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL'
        required: true
        type: string
      format:
        description: 'video or audio'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio
      quality:
        description: 'For video: 720p, 360p, etc. (leave blank for best)'
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Extract video ID
        id: extract
        run: |
          URL="${{ inputs.video_url }}"
          # Extract video ID from various YouTube URL formats
          VIDEO_ID=$(echo "$URL" | grep -oP '(?<=v=)[^&]+|(?<=youtu.be/)[^?]+')
          echo "VIDEO_ID=$VIDEO_ID" >> $GITHUB_ENV
          echo "Video ID: $VIDEO_ID"

      - name: Get download URL from Invidious
        id: get_url
        run: |
          VIDEO_ID="${{ env.VIDEO_ID }}"
          # Use a public Invidious instance (yewtu.be is reliable)
          INVIOUS_URL="https://yewtu.be/api/v1/videos/$VIDEO_ID"
          echo "Fetching $INVIOUS_URL"
          RESPONSE=$(curl -s "$INVIOUS_URL")
          
          if [ "${{ inputs.format }}" = "video" ]; then
            # Find the best video format (mp4, progressive)
            QUALITY="${{ inputs.quality }}"
            if [ -z "$QUALITY" ]; then
              # Pick the highest quality progressive (video+audio combined)
              DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.formatStreams[] | select(.type | startswith("video/mp4")) | .url' | head -1)
            else
              DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r ".formatStreams[] | select(.qualityLabel == \"$QUALITY\") | .url")
            fi
            if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
              # Fallback: use adaptive format and merge? But we'll keep simple
              DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.adaptiveFormats[] | select(.type | startswith("video/mp4")) | .url' | head -1)
            fi
          else
            # Audio only – best audio format
            DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.adaptiveFormats[] | select(.type | startswith("audio/mp4")) | .url' | head -1)
          fi
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "ERROR: Could not extract download URL"
            exit 1
          fi
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
          # Get video title for filename
          TITLE=$(echo "$RESPONSE" | jq -r '.title' | sed 's/[^a-zA-Z0-9]/_/g')
          echo "TITLE=$TITLE" >> $GITHUB_ENV

      - name: Download file with curl
        run: |
          EXT="mp4"
          if [ "${{ inputs.format }}" = "audio" ]; then
            EXT="m4a"
          fi
          FILENAME="${{ env.TITLE }}.$EXT"
          curl -L -o "$FILENAME" "${{ env.DOWNLOAD_URL }}"
          echo "FILE_NAME=$FILENAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download
          path: ${{ env.FILE_NAME }}
          retention-days: 90
