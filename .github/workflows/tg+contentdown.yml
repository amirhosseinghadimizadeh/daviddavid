name: 📦 Telegram Channel Mirror (Exact Web Replica)

on:
  workflow_dispatch:
    inputs:
      channels:
        description: 'Channel usernames (comma‑separated, no @)'
        required: true
        default: 'durov'
      limit:
        description: 'Number of recent posts per channel (max 100)'
        required: true
        default: '50'
        type: choice
        options: ['10','20','50','100']

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          pip install requests beautifulsoup4

      - name: Mirror Telegram channel (exact HTML)
        env:
          CHANNELS: ${{ github.event.inputs.channels }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          python3 << 'PYSCRIPT'
          import os, requests, re, time, sys, zipfile
          from bs4 import BeautifulSoup
          from pathlib import Path
          from datetime import datetime

          channels = [c.strip() for c in os.environ['CHANNELS'].split(',') if c.strip()]
          max_posts = int(os.environ['LIMIT'])
          if not channels:
              print("No channels")
              sys.exit(1)

          root = Path("telegram_offline")
          root.mkdir(exist_ok=True)
          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          def download_file(url, path):
              try:
                  r = requests.get(url, headers=headers, timeout=60, stream=True)
                  if r.status_code == 200:
                      path.parent.mkdir(parents=True, exist_ok=True)
                      with open(path, 'wb') as f:
                          for chunk in r.iter_content(8192):
                              f.write(chunk)
                      return True
              except Exception as e:
                  print(f"      DL error: {e}")
              return False

          for channel in channels:
              print(f"\n📡 Processing @{channel}")
              safe = re.sub(r'[^a-zA-Z0-9_]', '_', channel)
              ch_dir = root / safe
              media_dir = ch_dir / "media"
              ch_dir.mkdir(exist_ok=True)
              media_dir.mkdir(exist_ok=True)

              # Fetch the first page to get channel info and the base HTML structure
              url = f"https://t.me/s/{channel}"
              try:
                  resp = requests.get(url, headers=headers, timeout=30)
                  resp.raise_for_status()
              except Exception as e:
                  print(f"  ❌ Failed to fetch channel: {e}")
                  continue

              soup = BeautifulSoup(resp.text, 'html.parser')

              # Extract channel metadata
              channel_name = soup.select_one('.tgme_channel_info_header_title')
              channel_name = channel_name.get_text(strip=True) if channel_name else channel
              channel_about = soup.select_one('.tgme_channel_info_description')
              channel_about = channel_about.get_text(strip=True) if channel_about else ""
              # Channel photo (avatar)
              photo_elem = soup.select_one('.tgme_page_photo_image')
              avatar_url = None
              if photo_elem:
                  style = photo_elem.get('style', '')
                  m = re.search(r'url\(["\']?(.+?)["\']?\)', style)
                  if m:
                      avatar_url = m.group(1)
                      download_file(avatar_url, ch_dir / "avatar.jpg")
                      avatar_url = "avatar.jpg"

              # Get the CSS from the live page (it's linked)
              # We'll fetch the CSS file(s) to embed
              css_links = []
              for link in soup.find_all('link', rel='stylesheet'):
                  href = link.get('href')
                  if href and href.startswith('/'):
                      href = 'https://t.me' + href
                  elif href and not href.startswith('http'):
                      href = 'https://t.me' + href
                  if href:
                      css_links.append(href)
              # Download and combine CSS
              all_css = ""
              for css_url in css_links[:3]:  # first few are enough
                  try:
                      r = requests.get(css_url, headers=headers, timeout=15)
                      if r.status_code == 200:
                          all_css += r.text + "\n"
                  except:
                      pass

              # Now we need to paginate to get up to max_posts messages.
              # We'll collect messages from multiple pages, download media, and modify the HTML.
              # Instead of building HTML from scratch, we will clone the original page's message elements
              # and replace them with our own, keeping the exact same classes.

              # We'll store messages as HTML strings (the outer .tgme_widget_message_wrap)
              all_messages_html = []
              before = None
              fetched = 0

              while fetched < max_posts:
                  page_url = url if not before else f"{url}?before={before}"
                  try:
                      page_resp = requests.get(page_url, headers=headers, timeout=30)
                      page_resp.raise_for_status()
                  except:
                      break
                  page_soup = BeautifulSoup(page_resp.text, 'html.parser')
                  message_wraps = page_soup.select('.tgme_widget_message_wrap')
                  if not message_wraps:
                      break
                  for wrap in message_wraps:
                      if fetched >= max_posts:
                          break
                      # Clone the wrap HTML
                      wrap_html = str(wrap)
                      # Download media inside this wrap and replace URLs with local paths
                      # Parse again with BeautifulSoup to find media elements
                      temp_soup = BeautifulSoup(wrap_html, 'html.parser')
                      # Process photos (background-image style)
                      for photo in temp_soup.select('.tgme_widget_message_photo_wrap'):
                          style = photo.get('style', '')
                          m = re.search(r'url\(["\']?(.+?)["\']?\)', style)
                          if m:
                              img_url = m.group(1)
                              fname = f"{fetched}_{len(all_messages_html)}.jpg"
                              filepath = media_dir / fname
                              print(f"    📸 Downloading {fname}")
                              if download_file(img_url, filepath):
                                  # Replace style background-image with local file
                                  new_style = re.sub(r'url\(["\']?[^\)]+["\']?\)', f'url("media/{fname}")', style)
                                  photo['style'] = new_style
                                  # Also add a download link below the photo
                                  download_link = temp_soup.new_tag('a')
                                  download_link['href'] = f"media/{fname}"
                                  download_link['download'] = fname
                                  download_link['class'] = 'download-link'
                                  download_link.string = '📥 Download'
                                  # Insert after the photo wrap
                                  photo.insert_after(download_link)
                      # Process videos
                      for video in temp_soup.select('.tgme_widget_message_video video'):
                          src = video.get('src')
                          if src:
                              if src.startswith('/'):
                                  src = 'https://t.me' + src
                              fname = f"{fetched}_{len(all_messages_html)}.mp4"
                              filepath = media_dir / fname
                              print(f"    🎬 Downloading {fname}")
                              if download_file(src, filepath):
                                  video['src'] = f"media/{fname}"
                                  # Add download link after video container
                                  parent = video.find_parent('.tgme_widget_message_video')
                                  if parent:
                                      download_link = temp_soup.new_tag('a')
                                      download_link['href'] = f"media/{fname}"
                                      download_link['download'] = fname
                                      download_link['class'] = 'download-link'
                                      download_link.string = '📥 Download'
                                      parent.insert_after(download_link)
                      # Process document media (images/videos)
                      for doc in temp_soup.select('.tgme_widget_message_document'):
                          link = doc.select_one('a.tgme_widget_message_document')
                          if link and link.get('href'):
                              file_url = link['href']
                              if file_url.startswith('/'):
                                  file_url = 'https://t.me' + file_url
                              # Determine extension from URL or content-type (simplify to .mp4 for videos)
                              fname = f"{fetched}_{len(all_messages_html)}_doc.mp4"
                              filepath = media_dir / fname
                              print(f"    📄 Downloading document {fname}")
                              if download_file(file_url, filepath):
                                  # Replace the entire document preview with a video player + download link
                                  new_video = temp_soup.new_tag('video', controls=True, src=f"media/{fname}", **{'class': 'media-video'})
                                  new_video['style'] = 'max-width:100%; border-radius:12px;'
                                  doc.clear()
                                  doc.append(new_video)
                                  download_link = temp_soup.new_tag('a')
                                  download_link['href'] = f"media/{fname}"
                                  download_link['download'] = fname
                                  download_link['class'] = 'download-link'
                                  download_link.string = '📥 Download'
                                  doc.append(download_link)
                      # Re-serialize the modified wrap
                      all_messages_html.append(str(temp_soup))
                      fetched += 1
                  # Pagination
                  next_link = page_soup.select_one('a.tgme_widget_message_date[data-before]')
                  if not next_link or not next_link.get('data-before'):
                      break
                  before = next_link['data-before']
                  time.sleep(1)

              # Now build the final HTML by cloning the original page's outer structure
              # and replacing the messages container with our collected messages.
              # We'll take the original soup, remove all message wraps, then append ours.
              original_html = resp.text
              # Use BeautifulSoup to manipulate
              final_soup = BeautifulSoup(original_html, 'html.parser')
              # Remove all existing message wraps
              for wrap in final_soup.select('.tgme_widget_message_wrap'):
                  wrap.decompose()
              # Find the container that holds messages (usually a <div class="tgme_channel_history"> or similar)
              history_div = final_soup.select_one('.tgme_channel_history')
              if not history_div:
                  history_div = final_soup.find('div', class_=re.compile('history'))
              if not history_div:
                  # Fallback: just append to body
                  history_div = final_soup.body
              # Insert our collected messages
              for msg_html in all_messages_html:
                  msg_soup = BeautifulSoup(msg_html, 'html.parser')
                  history_div.append(msg_soup)
              # Also add some CSS for download links if not present
              style_tag = final_soup.new_tag('style')
              style_tag.string = '''
              .download-link {
                  display: inline-block;
                  margin-top: 8px;
                  font-size: 12px;
                  color: #6ab3f3;
                  text-decoration: none;
                  background: rgba(0,0,0,0.3);
                  padding: 4px 8px;
                  border-radius: 8px;
              }
              .download-link:hover { text-decoration: underline; }
              .media-video { max-width: 100%; border-radius: 12px; }
              '''
              final_soup.head.append(style_tag)

              # Save the final HTML
              with open(ch_dir / "index.html", "w", encoding="utf-8") as f:
                  f.write(str(final_soup))
              print(f"  ✅ Saved {len(all_messages_html)} posts, {len(list(media_dir.glob('*')))} media files")

          # Create ZIP
          zip_path = Path("telegram_offline_report.zip")
          with zipfile.ZipFile(zip_path, 'w') as zf:
              for file in root.rglob("*"):
                  zf.write(file, arcname=file.relative_to(root))
          print(f"\n✅ ZIP created: {zip_path} ({zip_path.stat().st_size} bytes)")
          PYSCRIPT

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: telegram-mirror
          path: telegram_offline_report.zip
          retention-days: 3
