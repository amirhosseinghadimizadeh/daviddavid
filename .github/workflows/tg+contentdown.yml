name: 📦 Download Telegram Channel (Exact Telegram Web Style + Media)

on:
  workflow_dispatch:
    inputs:
      channels:
        description: 'Channel usernames, comma separated, no @ (e.g., durov, telegram)'
        required: true
        default: 'durov'
      limit:
        description: 'Number of recent posts per channel (max 100)'
        required: true
        default: '50'
        type: choice
        options: ['10','20','50','100']

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip wget
          pip install requests beautifulsoup4

      - name: Download channel posts and media (Telegram Web style)
        env:
          CHANNELS: ${{ github.event.inputs.channels }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          python3 << 'EOF'
          import os, requests, re, time, sys, zipfile
          from bs4 import BeautifulSoup
          from pathlib import Path
          from datetime import datetime

          channels = [c.strip() for c in os.environ['CHANNELS'].split(',') if c.strip()]
          max_posts = int(os.environ['LIMIT'])
          if not channels:
              print("No channels")
              sys.exit(1)

          root = Path("telegram_offline")
          root.mkdir(exist_ok=True)
          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          def download_file(url, path):
              try:
                  r = requests.get(url, headers=headers, timeout=60, stream=True)
                  if r.status_code == 200:
                      path.parent.mkdir(parents=True, exist_ok=True)
                      with open(path, 'wb') as f:
                          for chunk in r.iter_content(8192):
                              f.write(chunk)
                      return True
              except Exception as e:
                  print(f"      DL error: {e}")
              return False

          for channel in channels:
              print(f"\n📡 Processing @{channel}")
              safe = re.sub(r'[^a-zA-Z0-9_]', '_', channel)
              ch_dir = root / safe
              media_dir = ch_dir / "media"
              ch_dir.mkdir(exist_ok=True)
              media_dir.mkdir(exist_ok=True)

              url = f"https://t.me/s/{channel}"
              before = None
              posts = []
              fetched = 0
              channel_name = channel
              channel_about = ""
              channel_photo_url = ""

              while fetched < max_posts:
                  page_url = url if not before else f"{url}?before={before}"
                  try:
                      resp = requests.get(page_url, headers=headers, timeout=30)
                      resp.raise_for_status()
                  except:
                      break
                  soup = BeautifulSoup(resp.text, 'html.parser')

                  if fetched == 0:
                      # Channel name
                      name_elem = soup.select_one('.tgme_channel_info_header_title')
                      if name_elem:
                          channel_name = name_elem.get_text(strip=True)
                      # About
                      about_elem = soup.select_one('.tgme_channel_info_description')
                      if about_elem:
                          channel_about = about_elem.get_text(strip=True)
                      # Channel photo (background image of the avatar)
                      photo_elem = soup.select_one('.tgme_page_photo_image')
                      if photo_elem:
                          style = photo_elem.get('style', '')
                          m = re.search(r'url\(["\']?(.+?)["\']?\)', style)
                          if m:
                              channel_photo_url = m.group(1)
                              # Download channel photo
                              if download_file(channel_photo_url, ch_dir / "avatar.jpg"):
                                  channel_photo_url = "avatar.jpg"

                  msgs = soup.select('.tgme_widget_message_wrap')
                  if not msgs:
                      break

                  for msg_wrap in msgs:
                      if fetched >= max_posts:
                          break
                      msg = msg_wrap.select_one('.tgme_widget_message')
                      if not msg:
                          continue

                      # ID and date
                      date_link = msg.select_one('.tgme_widget_message_date')
                      msg_id = date_link['href'].split('/')[-1] if date_link and date_link.get('href') else str(fetched)
                      date_elem = msg.select_one('.tgme_widget_message_date time')
                      date_str = date_elem['datetime'] if date_elem else "Unknown"
                      try:
                          dt = datetime.fromisoformat(date_str.replace('Z', '+00:00'))
                          date_str = dt.strftime('%Y-%m-%d %H:%M:%S')
                      except:
                          pass

                      # Text
                      text_elem = msg.select_one('.tgme_widget_message_text')
                      text = text_elem.get_text(strip=True) if text_elem else ""
                      text = re.sub(r'(https?://[^\s]+)', r'<a href="\1" target="_blank">\1</a>', text)
                      text = text or ""

                      # Media handling: download and generate HTML with download link
                      media_html = ""
                      media_files = []  # list of (relative_path, display_name)

                      # Photo
                      photo = msg.select_one('.tgme_widget_message_photo_wrap')
                      if photo:
                          style = photo.get('style', '')
                          m = re.search(r'url\(["\']?(.+?)["\']?\)', style)
                          if m:
                              img_url = m.group(1)
                              fname = f"{msg_id}.jpg"
                              path = media_dir / fname
                              print(f"    📸 Downloading {fname}")
                              if download_file(img_url, path):
                                  media_files.append((f"media/{fname}", fname))
                                  # Display image + download link
                                  media_html = f'''
                                  <div class="media-container">
                                      <img src="media/{fname}" loading="lazy" class="media-img">
                                      <a href="media/{fname}" download="{fname}" class="download-link">📥 Download</a>
                                  </div>'''
                      # Video
                      video = msg.select_one('.tgme_widget_message_video video')
                      if video and video.get('src'):
                          vid_url = video['src']
                          if vid_url.startswith('/'):
                              vid_url = 'https://t.me' + vid_url
                          fname = f"{msg_id}.mp4"
                          path = media_dir / fname
                          print(f"    🎬 Downloading {fname}")
                          if download_file(vid_url, path):
                              media_files.append((f"media/{fname}", fname))
                              media_html = f'''
                              <div class="media-container">
                                  <video controls src="media/{fname}" class="media-video"></video>
                                  <a href="media/{fname}" download="{fname}" class="download-link">📥 Download</a>
                              </div>'''
                      # Document media (images/videos from docs)
                      doc = msg.select_one('.tgme_widget_message_document')
                      if doc and not media_html:
                          # Check if it's a video/gif document
                          link = doc.select_one('a.tgme_widget_message_document')
                          if link and link.get('href'):
                              file_url = link['href']
                              if file_url.startswith('/'):
                                  file_url = 'https://t.me' + file_url
                              # Guess extension from URL or content-type? Use .mp4 for videos
                              fname = f"{msg_id}_doc.mp4"
                              path = media_dir / fname
                              print(f"    🎞️ Downloading document {fname}")
                              if download_file(file_url, path):
                                  media_files.append((f"media/{fname}", fname))
                                  media_html = f'''
                                  <div class="media-container">
                                      <video controls src="media/{fname}" class="media-video"></video>
                                      <a href="media/{fname}" download="{fname}" class="download-link">📥 Download</a>
                                  </div>'''
                          else:
                              # Try to get thumbnail image
                              thumb = doc.select_one('.tgme_widget_message_document_thumb')
                              if thumb:
                                  style = thumb.get('style', '')
                                  m = re.search(r'url\(["\']?(.+?)["\']?\)', style)
                                  if m:
                                      img_url = m.group(1)
                                      fname = f"{msg_id}_doc.jpg"
                                      path = media_dir / fname
                                      print(f"    📄 Downloading document thumbnail {fname}")
                                      if download_file(img_url, path):
                                          media_files.append((f"media/{fname}", fname))
                                          media_html = f'''
                                          <div class="media-container">
                                              <img src="media/{fname}" loading="lazy" class="media-img">
                                              <a href="media/{fname}" download="{fname}" class="download-link">📥 Download</a>
                                          </div>'''

                      posts.append({
                          'date': date_str,
                          'text': text,
                          'media_html': media_html,
                          'media_files': media_files
                      })
                      fetched += 1

                  # Pagination
                  next_link = soup.select_one('a.tgme_widget_message_date[data-before]')
                  if not next_link or not next_link.get('data-before'):
                      break
                  before = next_link['data-before']
                  time.sleep(1)

              if not posts:
                  print(f"  ⚠️ No posts found for @{channel}")
                  posts = [{'date': 'N/A', 'text': 'No posts could be fetched.', 'media_html': '', 'media_files': []}]

              # Build exact Telegram Web HTML/CSS
              avatar_html = f'<img src="{channel_photo_url}" class="avatar" alt="avatar">' if channel_photo_url else '<div class="avatar-placeholder">📢</div>'
              html = f'''<!DOCTYPE html>
              <html lang="en">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
                  <title>@{channel} – Telegram Channel Archive</title>
                  <style>
                      * {{ margin: 0; padding: 0; box-sizing: border-box; }}
                      body {{
                          background: var(--tg-theme-bg-color, #0a0a0a);
                          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                          color: var(--tg-theme-text-color, #ffffff);
                          overflow-y: scroll;
                      }}
                      /* Telegram Web variables */
                      :root {{
                          --tg-theme-bg-color: #0a0a0a;
                          --tg-theme-secondary-bg-color: #1f1f1f;
                          --tg-theme-text-color: #ffffff;
                          --tg-theme-hint-color: #aaaaaa;
                          --tg-theme-link-color: #6ab3f3;
                          --tg-theme-button-color: #2b5278;
                      }}
                      .chat-container {{
                          max-width: 800px;
                          margin: 0 auto;
                          padding: 0 10px;
                      }}
                      /* Channel header */
                      .channel-header {{
                          display: flex;
                          align-items: center;
                          gap: 12px;
                          padding: 16px 0;
                          border-bottom: 1px solid rgba(255,255,255,0.1);
                          margin-bottom: 16px;
                      }}
                      .avatar {{
                          width: 56px;
                          height: 56px;
                          border-radius: 50%;
                          object-fit: cover;
                          background: #2b5278;
                      }}
                      .avatar-placeholder {{
                          width: 56px;
                          height: 56px;
                          border-radius: 50%;
                          background: #2b5278;
                          display: flex;
                          align-items: center;
                          justify-content: center;
                          font-size: 32px;
                      }}
                      .channel-info h1 {{
                          font-size: 1.3rem;
                          font-weight: 500;
                      }}
                      .channel-info .username {{
                          color: var(--tg-theme-hint-color);
                          font-size: 0.85rem;
                      }}
                      .channel-info .about {{
                          margin-top: 4px;
                          font-size: 0.85rem;
                          color: var(--tg-theme-hint-color);
                      }}
                      /* Messages */
                      .message {{
                          display: flex;
                          flex-direction: column;
                          margin-bottom: 16px;
                      }}
                      .message-date {{
                          text-align: center;
                          font-size: 0.7rem;
                          color: var(--tg-theme-hint-color);
                          margin: 16px 0 8px;
                      }}
                      .bubble {{
                          background: var(--tg-theme-secondary-bg-color);
                          border-radius: 18px;
                          padding: 8px 12px;
                          max-width: 85%;
                          align-self: flex-start;
                          word-wrap: break-word;
                      }}
                      .text {{
                          font-size: 0.95rem;
                          line-height: 1.4;
                      }}
                      .text a {{
                          color: var(--tg-theme-link-color);
                          text-decoration: none;
                      }}
                      .media-container {{
                          margin-top: 8px;
                          display: flex;
                          flex-direction: column;
                          gap: 8px;
                      }}
                      .media-img, .media-video {{
                          max-width: 100%;
                          max-height: 300px;
                          border-radius: 12px;
                          display: block;
                      }}
                      .download-link {{
                          font-size: 0.75rem;
                          color: var(--tg-theme-link-color);
                          text-decoration: none;
                          display: inline-flex;
                          align-items: center;
                          gap: 4px;
                          width: fit-content;
                      }}
                      .download-link:hover {{
                          text-decoration: underline;
                      }}
                      footer {{
                          text-align: center;
                          font-size: 0.7rem;
                          color: var(--tg-theme-hint-color);
                          padding: 20px;
                          border-top: 1px solid rgba(255,255,255,0.1);
                          margin-top: 20px;
                      }}
                  </style>
              </head>
              <body>
              <div class="chat-container">
                  <div class="channel-header">
                      {avatar_html}
                      <div class="channel-info">
                          <h1>{channel_name}</h1>
                          <div class="username">@{channel}</div>
                          <div class="about">{channel_about}</div>
                      </div>
                  </div>
              '''
              # Group messages by date (optional)
              last_date = None
              for p in posts:
                  # Show date header if new day
                  current_date = p['date'].split(' ')[0] if ' ' in p['date'] else p['date']
                  if current_date != last_date:
                      html += f'<div class="message-date">{current_date}</div>'
                      last_date = current_date
                  html += f'''
                  <div class="message">
                      <div class="bubble">
                          <div class="text">{p['text'] if p['text'] else ''}</div>
                          {p['media_html']}
                          <div class="message-time" style="font-size:0.65rem; color:#888; margin-top:4px;">{p['date'].split(' ')[1] if ' ' in p['date'] else p['date']}</div>
                      </div>
                  </div>
                  '''
              html += f'''
                  <footer>
                      Archived offline from Telegram on {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}<br>
                      Media files are stored locally. Click "Download" to save any file.
                  </footer>
              </div>
              </body>
              </html>
              '''
              with open(ch_dir / "index.html", "w", encoding="utf-8") as f:
                  f.write(html)
              print(f"  ✅ Saved {len(posts)} posts, {len(list(media_dir.glob('*')))} media files")

          # Create ZIP
          zip_path = Path("telegram_offline_report.zip")
          with zipfile.ZipFile(zip_path, 'w') as zf:
              for file in root.rglob("*"):
                  zf.write(file, arcname=file.relative_to(root))
          print(f"\n✅ ZIP created: {zip_path} ({zip_path.stat().st_size} bytes)")
          EOF

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: telegram-offline-report
          path: telegram_offline_report.zip
          retention-days: 3
