name: 📦 Telegram Channel Mirror (Static Telegram Web Style)

on:
  workflow_dispatch:
    inputs:
      channels:
        description: 'Channel usernames (comma‑separated, no @)'
        required: true
        default: 'durov'
      limit:
        description: 'Number of recent posts per channel (max 100)'
        required: true
        default: '50'
        type: choice
        options: ['10','20','50','100']

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          pip install requests beautifulsoup4

      - name: Scrape channel and build static Telegram‑style HTML
        env:
          CHANNELS: ${{ github.event.inputs.channels }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          python3 << 'PYSCRIPT'
          import os, requests, re, time, sys, zipfile
          from bs4 import BeautifulSoup
          from pathlib import Path
          from datetime import datetime

          channels = [c.strip() for c in os.environ['CHANNELS'].split(',') if c.strip()]
          max_posts = int(os.environ['LIMIT'])
          if not channels:
              print("No channels")
              sys.exit(1)

          root = Path("telegram_offline")
          root.mkdir(exist_ok=True)
          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          def download_file(url, path):
              try:
                  r = requests.get(url, headers=headers, timeout=60, stream=True)
                  if r.status_code == 200:
                      path.parent.mkdir(parents=True, exist_ok=True)
                      with open(path, 'wb') as f:
                          for chunk in r.iter_content(8192):
                              f.write(chunk)
                      return True
              except Exception as e:
                  print(f"      DL error: {e}")
              return False

          # Telegram Web exact style (dark theme, static)
          TELEGRAM_CSS = """
          :root {
              --tg-bg: #0a0a0a;
              --tg-secondary-bg: #1f1f1f;
              --tg-text: #ffffff;
              --tg-hint: #aaaaaa;
              --tg-link: #6ab3f3;
              --tg-accent: #2b5278;
              --tg-border: rgba(255,255,255,0.1);
          }
          * { margin:0; padding:0; box-sizing:border-box; }
          body {
              background: var(--tg-bg);
              font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
              color: var(--tg-text);
              line-height: 1.4;
          }
          .container {
              max-width: 800px;
              margin: 0 auto;
              padding: 0 12px;
          }
          /* Channel header */
          .channel-header {
              display: flex;
              align-items: center;
              gap: 16px;
              padding: 20px 0;
              border-bottom: 1px solid var(--tg-border);
              margin-bottom: 16px;
          }
          .avatar {
              width: 56px;
              height: 56px;
              border-radius: 50%;
              object-fit: cover;
              background: var(--tg-accent);
          }
          .avatar-placeholder {
              width: 56px;
              height: 56px;
              border-radius: 50%;
              background: var(--tg-accent);
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 32px;
          }
          .channel-info h1 {
              font-size: 1.3rem;
              font-weight: 500;
          }
          .channel-info .username {
              color: var(--tg-hint);
              font-size: 0.85rem;
          }
          .channel-info .about {
              margin-top: 4px;
              font-size: 0.85rem;
              color: var(--tg-hint);
          }
          /* Date separator */
          .date-separator {
              text-align: center;
              font-size: 0.7rem;
              color: var(--tg-hint);
              margin: 16px 0 12px;
              position: relative;
          }
          /* Message bubble */
          .message {
              display: flex;
              margin-bottom: 16px;
          }
          .bubble {
              background: var(--tg-secondary-bg);
              border-radius: 18px;
              padding: 8px 12px;
              max-width: 85%;
              word-wrap: break-word;
          }
          .message-text {
              font-size: 0.95rem;
              margin-bottom: 6px;
          }
          .message-text a {
              color: var(--tg-link);
              text-decoration: none;
          }
          .message-time {
              font-size: 0.65rem;
              color: var(--tg-hint);
              margin-top: 4px;
          }
          /* Media */
          .media-container {
              margin-top: 8px;
          }
          .media-img, .media-video {
              max-width: 100%;
              max-height: 300px;
              border-radius: 12px;
              display: block;
          }
          .download-link {
              display: inline-block;
              margin-top: 6px;
              font-size: 12px;
              color: var(--tg-link);
              text-decoration: none;
              background: rgba(0,0,0,0.3);
              padding: 4px 8px;
              border-radius: 8px;
          }
          .download-link:hover { text-decoration: underline; }
          footer {
              text-align: center;
              font-size: 0.7rem;
              color: var(--tg-hint);
              padding: 20px;
              border-top: 1px solid var(--tg-border);
              margin-top: 20px;
          }
          """

          for channel in channels:
              print(f"\n📡 Processing @{channel}")
              safe = re.sub(r'[^a-zA-Z0-9_]', '_', channel)
              ch_dir = root / safe
              media_dir = ch_dir / "media"
              ch_dir.mkdir(exist_ok=True)
              media_dir.mkdir(exist_ok=True)

              url = f"https://t.me/s/{channel}"
              before = None
              posts = []   # list of dicts with 'date', 'text', 'media_html'
              fetched = 0
              channel_name = channel
              channel_about = ""
              avatar_local = None

              # Fetch first page to get channel metadata and avatar
              try:
                  resp = requests.get(url, headers=headers, timeout=30)
                  resp.raise_for_status()
              except:
                  print(f"  ❌ Failed to fetch channel")
                  continue
              soup = BeautifulSoup(resp.text, 'html.parser')
              name_elem = soup.select_one('.tgme_channel_info_header_title')
              if name_elem:
                  channel_name = name_elem.get_text(strip=True)
              about_elem = soup.select_one('.tgme_channel_info_description')
              if about_elem:
                  channel_about = about_elem.get_text(strip=True)
              # Avatar
              avatar_elem = soup.select_one('.tgme_page_photo_image')
              if avatar_elem:
                  style = avatar_elem.get('style', '')
                  m = re.search(r'url\(["\']?(.+?)["\']?\)', style)
                  if m:
                      avatar_url = m.group(1)
                      avatar_local = "avatar.jpg"
                      download_file(avatar_url, ch_dir / avatar_local)

              # Paginate to get up to max_posts
              while fetched < max_posts:
                  page_url = url if not before else f"{url}?before={before}"
                  try:
                      page_resp = requests.get(page_url, headers=headers, timeout=30)
                      page_resp.raise_for_status()
                  except:
                      break
                  page_soup = BeautifulSoup(page_resp.text, 'html.parser')
                  msgs = page_soup.select('.tgme_widget_message_wrap')
                  if not msgs:
                      break
                  for msg_wrap in msgs:
                      if fetched >= max_posts:
                          break
                      msg = msg_wrap.select_one('.tgme_widget_message')
                      if not msg:
                          continue
                      # Date
                      date_link = msg.select_one('.tgme_widget_message_date')
                      date_elem = date_link.select_one('time') if date_link else None
                      date_str = "Unknown date"
                      if date_elem and date_elem.get('datetime'):
                          try:
                              dt = datetime.fromisoformat(date_elem['datetime'].replace('Z', '+00:00'))
                              date_str = dt.strftime('%Y-%m-%d %H:%M:%S')
                          except:
                              date_str = date_elem.get_text(strip=True)
                      # Text
                      text_elem = msg.select_one('.tgme_widget_message_text')
                      text = text_elem.get_text(strip=True) if text_elem else ""
                      text = re.sub(r'(https?://[^\s]+)', r'<a href="\1" target="_blank">\1</a>', text)
                      text = text or "<i>No text</i>"

                      # Media handling
                      media_html = ""
                      # Photo
                      photo = msg.select_one('.tgme_widget_message_photo_wrap')
                      if photo:
                          style = photo.get('style', '')
                          m = re.search(r'url\(["\']?(.+?)["\']?\)', style)
                          if m:
                              img_url = m.group(1)
                              fname = f"{fetched}_{len(posts)}.jpg"
                              path = media_dir / fname
                              print(f"    📸 Downloading {fname}")
                              if download_file(img_url, path):
                                  media_html = f'''
                                  <div class="media-container">
                                      <img src="media/{fname}" class="media-img" loading="lazy">
                                      <a href="media/{fname}" download="{fname}" class="download-link">📥 Download</a>
                                  </div>'''
                      # Video
                      video = msg.select_one('.tgme_widget_message_video video')
                      if video and video.get('src'):
                          vid_url = video['src']
                          if vid_url.startswith('/'):
                              vid_url = 'https://t.me' + vid_url
                          fname = f"{fetched}_{len(posts)}.mp4"
                          path = media_dir / fname
                          print(f"    🎬 Downloading {fname}")
                          if download_file(vid_url, path):
                              media_html = f'''
                              <div class="media-container">
                                  <video controls src="media/{fname}" class="media-video"></video>
                                  <a href="media/{fname}" download="{fname}" class="download-link">📥 Download</a>
                              </div>'''
                      # Document (video/image)
                      doc = msg.select_one('.tgme_widget_message_document')
                      if doc and not media_html:
                          link = doc.select_one('a.tgme_widget_message_document')
                          if link and link.get('href'):
                              file_url = link['href']
                              if file_url.startswith('/'):
                                  file_url = 'https://t.me' + file_url
                              fname = f"{fetched}_{len(posts)}_doc.mp4"
                              path = media_dir / fname
                              print(f"    📄 Downloading document {fname}")
                              if download_file(file_url, path):
                                  media_html = f'''
                                  <div class="media-container">
                                      <video controls src="media/{fname}" class="media-video"></video>
                                      <a href="media/{fname}" download="{fname}" class="download-link">📥 Download</a>
                                  </div>'''
                          else:
                              thumb = doc.select_one('.tgme_widget_message_document_thumb')
                              if thumb:
                                  style = thumb.get('style', '')
                                  m = re.search(r'url\(["\']?(.+?)["\']?\)', style)
                                  if m:
                                      img_url = m.group(1)
                                      fname = f"{fetched}_{len(posts)}_doc.jpg"
                                      path = media_dir / fname
                                      print(f"    📸 Downloading doc thumbnail {fname}")
                                      if download_file(img_url, path):
                                          media_html = f'''
                                          <div class="media-container">
                                              <img src="media/{fname}" class="media-img" loading="lazy">
                                              <a href="media/{fname}" download="{fname}" class="download-link">📥 Download</a>
                                          </div>'''

                      posts.append({
                          'date': date_str,
                          'text': text,
                          'media_html': media_html
                      })
                      fetched += 1
                  # Pagination
                  next_link = page_soup.select_one('a.tgme_widget_message_date[data-before]')
                  if not next_link or not next_link.get('data-before'):
                      break
                  before = next_link['data-before']
                  time.sleep(1)

              if not posts:
                  print(f"  ⚠️ No posts found")
                  posts = [{'date': 'N/A', 'text': 'No posts could be fetched.', 'media_html': ''}]

              # Build the final HTML
              avatar_html = f'<img src="{avatar_local}" class="avatar" alt="avatar">' if avatar_local else '<div class="avatar-placeholder">📢</div>'
              html = f'''<!DOCTYPE html>
              <html lang="en">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
                  <title>@{channel} – Telegram Archive</title>
                  <style>{TELEGRAM_CSS}</style>
              </head>
              <body>
              <div class="container">
                  <div class="channel-header">
                      {avatar_html}
                      <div class="channel-info">
                          <h1>{channel_name}</h1>
                          <div class="username">@{channel}</div>
                          <div class="about">{channel_about}</div>
                      </div>
                  </div>
              '''
              last_date = None
              for p in posts:
                  # Date separator if day changes
                  current_day = p['date'].split(' ')[0] if ' ' in p['date'] else p['date']
                  if current_day != last_date:
                      html += f'<div class="date-separator">{current_day}</div>'
                      last_date = current_day
                  html += f'''
                  <div class="message">
                      <div class="bubble">
                          <div class="message-text">{p['text']}</div>
                          {p['media_html']}
                          <div class="message-time">{p['date'].split(' ')[1] if ' ' in p['date'] else p['date']}</div>
                      </div>
                  </div>
                  '''
              html += f'''
                  <footer>
                      Archived offline from Telegram on {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}<br>
                      Media files are stored locally. Click "Download" to save any file.
                  </footer>
              </div>
              </body>
              </html>
              '''
              with open(ch_dir / "index.html", "w", encoding="utf-8") as f:
                  f.write(html)
              print(f"  ✅ Saved {len(posts)} posts, {len(list(media_dir.glob('*')))} media files")

          # Create ZIP
          zip_path = Path("telegram_offline_report.zip")
          with zipfile.ZipFile(zip_path, 'w') as zf:
              for file in root.rglob("*"):
                  zf.write(file, arcname=file.relative_to(root))
          print(f"\n✅ ZIP created: {zip_path} ({zip_path.stat().st_size} bytes)")
          PYSCRIPT

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: telegram-mirror
          path: telegram_offline_report.zip
          retention-days: 3
