name: YouTube Downloader (FlashDL API)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL'
        required: true
        type: string
      format:
        description: 'video (mp4) or audio (mp3)'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get download link from FlashDL API
        id: get_link
        run: |
          URL="${{ inputs.video_url }}"
          FORMAT="${{ inputs.format }}"
          # FlashDL endpoint: https://api.flashdl.one/download?url=...&format=mp4 (or mp3)
          RESPONSE=$(curl -s "https://api.flashdl.one/download?url=$URL&format=$FORMAT")
          # API returns JSON with "downloadUrl" field
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.downloadUrl')
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "Failed to get download URL. Response: $RESPONSE"
            exit 1
          fi
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
          TITLE=$(echo "$RESPONSE" | jq -r '.title // "youtube_video"')
          echo "TITLE=$TITLE" >> $GITHUB_ENV

      - name: Download file
        run: |
          EXT="${{ inputs.format == 'video' && 'mp4' || 'mp3' }}"
          curl -L -o "${{ env.TITLE }}.$EXT" "${{ env.DOWNLOAD_URL }}"
          echo "FILE_NAME=${{ env.TITLE }}.$EXT" >> $GITHUB_ENV

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download
          path: ${{ env.FILE_NAME }}
          retention-days: 90
