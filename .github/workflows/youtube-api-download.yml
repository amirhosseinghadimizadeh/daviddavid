name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true
        type: string
      format:
        description: 'Format to download'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio

jobs:
  download:
    runs-on: ubuntu-latest
    # The container: line is the key to the solution
    container:
      image: ghcr.io/recorder-moe/yt-dlp:pot
    steps:
      - name: Download the video
        if: inputs.format == 'video'
        run: yt-dlp -f "best[ext=mp4]/best" -o "%(title)s.%(ext)s" "${{ inputs.url }}"
      - name: Download the audio
        if: inputs.format == 'audio'
        run: yt-dlp -f "bestaudio" --extract-audio --audio-format mp3 -o "%(title)s.%(ext)s" "${{ inputs.url }}"
      - name: Upload the file
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download
          path: ./*.mp4
          if-no-files-found: error
