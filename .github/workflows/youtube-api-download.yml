name: YouTube Downloader (April 2026)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
        type: string
      format:
        description: 'Format to download'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio

jobs:
  download:
    runs-on: ubuntu-latest
    container:
      # This is the official Docker image with the POT provider pre-configured
      image: ghcr.io/jim60105/yt-dlp:pot
    steps:
      - name: Download YouTube Video
        if: inputs.format == 'video'
        run: |
          yt-dlp --force-ipv4 \
            -f "best[ext=mp4]/best" \
            -o "%(title)s.%(ext)s" \
            "${{ inputs.video_url }}"
          echo "OUT_FILE=$(ls *.mp4 *.webm *.mkv | head -1)" >> $GITHUB_ENV
      - name: Download YouTube Audio
        if: inputs.format == 'audio'
        run: |
          yt-dlp --force-ipv4 \
            -f "bestaudio" \
            --extract-audio --audio-format mp3 \
            -o "%(title)s.%(ext)s" \
            "${{ inputs.video_url }}"
          echo "OUT_FILE=$(ls *.mp3 | head -1)" >> $GITHUB_ENV
      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download
          path: ${{ env.OUT_FILE }}
          retention-days: 90
