name: YouTube Downloader (April 2026)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
        type: string
      format:
        description: 'Format to download'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Install the latest yt-dlp nightly and ffmpeg
      - name: Install yt-dlp and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install --upgrade yt-dlp
      
      # Step 2: Attempt download with a client fallback strategy
      - name: Download Media with Client Fallback
        run: |
          URL="${{ inputs.video_url }}"
          FORMAT="${{ inputs.format }}"

          # Define an array of clients to try, from most to least likely to work
          clients=("web_safari" "ios" "android" "tv")

          for client in "${clients[@]}"; do
            echo "Trying client: $client"

            if [ "$FORMAT" = "video" ]; then
              if yt-dlp --force-ipv4 \
                --extractor-args "youtube:player_client=$client" \
                -f "best[ext=mp4]/best" \
                -o "%(title)s.%(ext)s" \
                "$URL"; then
                echo "Download successful with client: $client"
                exit 0
              fi
            else
              if yt-dlp --force-ipv4 \
                --extractor-args "youtube:player_client=$client" \
                -f "bestaudio" \
                --extract-audio --audio-format mp3 \
                -o "%(title)s.%(ext)s" \
                "$URL"; then
                echo "Download successful with client: $client"
                exit 0
              fi
            fi
          done

          echo "All clients failed. Attempting browser impersonation as a final fallback."

          if [ "$FORMAT" = "video" ]; then
            yt-dlp --force-ipv4 \
              --impersonate chrome \
              -f "best[ext=mp4]/best" \
              -o "%(title)s.%(ext)s" \
              "$URL"
          else
            yt-dlp --force-ipv4 \
              --impersonate chrome \
              -f "bestaudio" \
              --extract-audio --audio-format mp3 \
              -o "%(title)s.%(ext)s" \
              "$URL"
          fi

      # Step 3: Upload the downloaded file as an artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download
          path: ./*.mp4
          if-no-files-found: error
