name: YouTube Downloader (Proxy)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download via proxy
        run: |
          URL="${{ inputs.video_url }}"
          # Public proxy that returns direct download link
          curl -L "https://yt-downloader.deno.dev/download?url=$URL" -o video.mp4
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download
          path: video.mp4
