name: Mirror Website (Fully Offline)V2

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL (e.g., https://example.com)'
        required: true
        type: string
      depth:
        description: 'Maximum link depth (3-5)'
        required: false
        default: '3'
        type: string

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Install HTTrack
        run: sudo apt-get update && sudo apt-get install -y httrack

      - name: Mirror website with HTTrack
        run: |
          URL="${{ inputs.url }}"
          DEPTH="${{ inputs.depth }}"
          DOMAIN=$(echo "$URL" | awk -F/ '{print $3}')
          
          # Create output directory
          mkdir -p website_mirror
          cd website_mirror
          
          # Run httrack with options:
          # - %v : verbose
          # - %p : prompt (no interactive)
          # - %r : stay on the same domain (but also fetch external CSS/images if needed)
          # - %d : depth
          # - %N : non-stop (ignore errors)
          # - %e : email (none)
          # - %s : scripts (download linked scripts)
          # - %u : update (no)
          # - %I : images (download all)
          # - %c : cache (no)
          # - %F : get files (all types)
          # - %P : save to current directory
          httrack "$URL" -O "./" \
            --depth=$DEPTH \
            --mirror \
            --robots=0 \
            --stay-on-same-domain \
            --ext-depth=2 \
            --can-go-down-and-up \
            --verbose \
            --keep-session \
            --enable-gzip \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
          
          # HTTrack creates a folder like "example.com". Move contents up
          SUBDIR=$(find . -maxdepth 1 -type d -name "*.*" | head -1)
          if [ -n "$SUBDIR" ] && [ "$SUBDIR" != "." ]; then
            mv "$SUBDIR"/* ./
            rm -rf "$SUBDIR"
          fi

      - name: Compress into ZIP
        run: zip -r website_offline.zip website_mirror/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-offline
          path: website_offline.zip
          retention-days: 7
