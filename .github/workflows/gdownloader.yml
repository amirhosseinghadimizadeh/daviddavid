name: Mirror Website with wget2
on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'Website URL (e.g., https://www.bbc.com)'
        required: true
        type: string

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Install wget2
        run: sudo apt-get update && sudo apt-get install -y wget2

      - name: Download site
        run: |
          mkdir site_mirror && cd site_mirror
          wget2 \
            --recursive \
            --level=inf \
            --no-verbose \
            --convert-links \
            --page-requisites \
            --adjust-extension \
            --no-parent \
            --span-hosts \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:135.0) Gecko/20100101 Firefox/135.0" \
            "${{ inputs.site_url }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirrored-site
          path: site_mirror/
          retention-days: 7
