name: Download Full Website (Debug)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL (must start with https://)'
        required: true
        type: string
      depth:
        description: 'Maximum link depth (1-3)'
        required: false
        default: '2'
        type: string

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Install wget
        run: sudo apt-get update && sudo apt-get install -y wget

      - name: Create output directory
        run: mkdir -p website_mirror

      - name: Download website with wget (verbose)
        run: |
          cd website_mirror
          URL="${{ inputs.url }}"
          DEPTH="${{ inputs.depth }}"
          DOMAIN=$(echo "$URL" | awk -F/ '{print $3}')
          
          echo "=== Starting download of $URL (depth $DEPTH) ==="
          
          wget \
            --recursive \
            --level=$DEPTH \
            --no-clobber \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --restrict-file-names=windows \
            --domains=$DOMAIN \
            --no-parent \
            --wait=1 \
            --random-wait \
            --limit-rate=500k \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --verbose \
            --debug \
            --output-file=wget.log \
            "$URL"
          
          echo "=== Download finished ==="
          echo "Files in current directory:"
          ls -la
          echo "=== wget.log last 50 lines ==="
          tail -50 wget.log

      - name: Check if any files were downloaded
        run: |
          cd website_mirror
          FILE_COUNT=$(find . -type f | wc -l)
          echo "Total files downloaded: $FILE_COUNT"
          if [ $FILE_COUNT -eq 0 ]; then
            echo "ERROR: No files were downloaded. Check the URL and network."
            echo "wget.log content:"
            cat wget.log
            exit 1
          fi

      - name: Compress (only if files exist)
        if: success()
        run: zip -r website_mirror.zip website_mirror/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: website-mirror
          path: |
            website_mirror.zip
            website_mirror/wget.log
          retention-days: 7
