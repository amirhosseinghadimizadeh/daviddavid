name: Download and Archive Website

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'The full URL of the website to download (e.g., https://example.com)'
        required: true
        type: string
      max_pages:
        description: 'Maximum number of pages to download'
        required: false
        default: '100'
        type: string

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Install website-downloader
        run: |
          git clone https://github.com/PKHarsimran/website-downloader.git
          cd website-downloader
          pip install -r requirements.txt

      - name: Run website-downloader
        run: |
          cd website-downloader
          python website-downloader.py \
            --url "${{ inputs.site_url }}" \
            --destination ./downloaded_site \
            --max-pages ${{ inputs.max_pages }} \
            --threads 8

      - name: Upload result as artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-website
          path: website-downloader/downloaded_site/
          retention-days: 7
