name: Download Full Website (Offline Ready)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL (e.g., https://example.com)'
        required: true
        type: string
      depth:
        description: 'Maximum link depth (1-5)'
        required: false
        default: '3'
        type: string

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Create output folder
        run: mkdir -p website_mirror

      - name: Download everything with wget
        run: |
          cd website_mirror
          URL="${{ inputs.url }}"
          DEPTH="${{ inputs.depth }}"
          DOMAIN=$(echo "$URL" | awk -F/ '{print $3}')

          wget \
            --recursive \
            --level=$DEPTH \
            --no-clobber \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --restrict-file-names=windows \
            --domains=$DOMAIN \
            --no-parent \
            --wait=1 \
            --random-wait \
            --limit-rate=500k \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --accept="*.html,*.htm,*.css,*.js,*.jpg,*.jpeg,*.png,*.gif,*.svg,*.webp,*.mp4,*.webm,*.ogg,*.mp3,*.wav,*.woff,*.woff2,*.ttf,*.eot,*.ico,*.pdf" \
            "$URL"

      - name: Compress into ZIP
        run: zip -r website_mirror.zip website_mirror/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-mirror
          path: website_mirror.zip
          retention-days: 7
