name: Mirror Website (Fully Offline)V4

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL (e.g., https://opensim.io)'
        required: true
        type: string
      depth:
        description: 'Maximum link depth (3-5)'
        required: false
        default: '3'
        type: string

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Install HTTrack
        run: sudo apt-get update && sudo apt-get install -y httrack

      - name: Mirror website with HTTrack
        run: |
          URL="${{ inputs.url }}"
          DEPTH="${{ inputs.depth }}"

          mkdir -p website_mirror
          cd website_mirror

          httrack "$URL" -O . \
            --depth=$DEPTH \
            --mirror \
            --robots=0 \
            --stay-on-same-domain \
            --ext-depth=2 \
            --can-go-up-and-down \
            --verbose \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

          SUBDIR=$(find . -maxdepth 1 -type d -name "*.*" | grep -v "^\.$" | head -1)
          if [ -n "$SUBDIR" ] && [ "$SUBDIR" != "." ]; then
            mv "$SUBDIR"/* ./ 2>/dev/null || true
            rm -rf "$SUBDIR"
          fi

      - name: Compress into ZIP
        run: zip -r website_offline.zip website_mirror/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-offline
          path: website_offline.zip
          retention-days: 7
