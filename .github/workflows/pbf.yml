name: Search Pbp

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query (e.g., "The Rookie S08E15")'
        required: true
        type: string
      proxy_url:
        description: 'Proxy URL (optional, uses fallbacks if empty)'
        required: false
        type: string

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Install Python dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper with fallback proxies
        run: |
          python3 << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          import urllib.parse
          import sys
          import time

          query = "${{ inputs.query }}"
          custom_proxy = "${{ inputs.proxy_url }}".strip()

          # List of known working proxies (update as needed)
          PROXY_LIST = [
              "https://pirateproxy-bay.com",
              "https://thepiratebay10.org",
              "https://tpbproxy.com",
              "https://piratebayproxy.info",
              "https://pirateproxy.live",
          ]

          if custom_proxy:
              PROXY_LIST.insert(0, custom_proxy.rstrip('/'))

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
          }

          search_url = None
          last_error = None

          # Try each proxy until one works
          for proxy in PROXY_LIST:
              test_url = f"{proxy}/search/{urllib.parse.quote(query)}/0/7/0"
              print(f"Trying: {test_url}")
              try:
                  resp = requests.get(test_url, headers=headers, timeout=15)
                  if resp.status_code == 200:
                      # Verify it's not a Cloudflare block page
                      if "cloudflare" not in resp.text.lower():
                          search_url = test_url
                          print(f"✅ Success! Using: {proxy}")
                          break
                      else:
                          print(f"⚠️ Cloudflare detected at {proxy}")
                  else:
                      print(f"❌ HTTP {resp.status_code} from {proxy}")
              except Exception as e:
                  print(f"❌ Failed {proxy}: {str(e)[:50]}")
                  last_error = str(e)
              time.sleep(1)

          if not search_url:
              print(f"No working proxy found. Last error: {last_error}")
              sys.exit(1)

          # Parse the successful page
          resp = requests.get(search_url, headers=headers, timeout=30)
          soup = BeautifulSoup(resp.text, 'html.parser')
          table = soup.find('table', id='searchResult')
          if not table:
              table = soup.find('table')
          if not table:
              print("No results table found on the page.")
              sys.exit(1)

          rows = table.find_all('tr')[1:]
          if not rows:
              print("No results found.")
              sys.exit(0)

          with open('results.txt', 'w', encoding='utf-8') as f:
              f.write(f"Search: {query}\nProxy: {search_url}\n{'='*60}\n\n")
              count = 0
              for idx, row in enumerate(rows, 1):
                  name_cell = row.find('td')
                  if not name_cell:
                      continue
                  name_link = name_cell.find('a', class_='detLink')
                  if not name_link:
                      name_link = name_cell.find('a')
                  if not name_link:
                      continue
                  name = name_link.get_text(strip=True)

                  magnet = None
                  for a in row.find_all('a', href=True):
                      if a['href'].startswith('magnet:'):
                          magnet = a['href']
                          break

                  cells = row.find_all('td')
                  size = cells[2].get_text(strip=True) if len(cells) > 2 else "?"

                  if magnet:
                      f.write(f"{idx}. {name}\n   Size: {size}\n   Magnet: {magnet}\n\n")
                      count += 1
                  else:
                      f.write(f"{idx}. {name}\n   Size: {size}\n   Magnet: not available\n\n")

              f.write(f"Total results with magnet: {count}\n")

          print(f"Saved {count} results to results.txt")
          EOF

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: tpb-search-results
          path: results.txt
          retention-days: 1
